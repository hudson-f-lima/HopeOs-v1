/* ── SMART WAITLIST — MVP LOCAL ── */
function Waitlist({clientes,servicos,onAgendar}){
  const[lista,setLista]=useState(()=>load(KEYS.listaEspera)||[]);
  const[f,setF]=useState({clienteId:'',clienteNome:'',servicoId:'',dataPreferencia:todayStr(),observacao:''});
  const[search,setSearch]=useState('');
  useEffect(()=>save(KEYS.listaEspera,lista),[lista]);
  const s=(k,v)=>setF(x=>({...x,[k]:v}));
  const clienteNome=id=>clientes.find(c=>c.id===id)?.nome||'';
  const servNome=id=>servicos.find(sv=>sv.id===id)?.nome||'Serviço não definido';
  function add(){
    const nome=(f.clienteId?clienteNome(f.clienteId):f.clienteNome).trim();
    if(!nome){toast('Informe cliente ou nome avulso','error');return;}
    const item={id:uid(),clienteId:f.clienteId||'',clienteNome:nome,servicoId:f.servicoId||'',dataPreferencia:f.dataPreferencia||todayStr(),observacao:f.observacao||'',status:'aguardando',criadoEm:new Date().toISOString()};
    setLista(p=>[item,...p]);
    setF({clienteId:'',clienteNome:'',servicoId:'',dataPreferencia:todayStr(),observacao:''});
    toast('Cliente adicionado à fila','success');
  }
  function updateStatus(id,status){setLista(p=>p.map(i=>i.id===id?{...i,status,atualizadoEm:new Date().toISOString()}:i));}
  function avisarWhatsApp(item){
    const cli=clientes.find(c=>c.id===item.clienteId);
    const nome=item.clienteNome||cli?.nome||'Cliente';
    const abriu=abrirWhatsAppCliente(cli,msgWaitlistDanny(nome));
    if(!abriu){toast('Cliente sem WhatsApp cadastrado na fila','warn');return;}
    updateStatus(item.id,'contactado');
    toast('WhatsApp aberto para aviso da vaga','success');
  }
  const filtrada=lista.filter(i=>fuzzyMatch(search,[i.clienteNome,clienteNome(i.clienteId),servNome(i.servicoId),i.dataPreferencia,i.observacao,i.status]));
  const aguardando=lista.filter(i=>(i.status||'aguardando')==='aguardando').length;
  return <div style={{padding:24,maxWidth:900,margin:'0 auto'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
      <div><h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.02em'}}>Fila de Espera</h1><div style={{fontSize:13,color:'var(--muted)',marginTop:2}}>{aguardando} aguardando encaixe</div></div>
    </div>
    <div className="card" style={{marginBottom:16}}>
      <div className="section-title">Adicionar à fila</div>
      <div className="field-row" style={{marginBottom:12}}>
        <div className="field" style={{marginBottom:0}}><label>Cliente cadastrado</label><select value={f.clienteId} onChange={e=>s('clienteId',e.target.value)}><option value="">Cliente avulso / digitar nome</option>{clientes.map(c=><option key={c.id} value={c.id}>{c.nome}{getFaltasCliente(c)>0?` — ${getFaltasCliente(c)} falta(s)`:''}</option>)}</select></div>
        <div className="field" style={{marginBottom:0}}><label>Nome avulso</label><input value={f.clienteNome} onChange={e=>s('clienteNome',e.target.value)} placeholder="Nome se não estiver cadastrado" disabled={!!f.clienteId}/></div>
      </div>
      <div className="field-row" style={{marginBottom:12}}>
        <div className="field" style={{marginBottom:0}}><label>Serviço desejado</label><select value={f.servicoId} onChange={e=>s('servicoId',e.target.value)}><option value="">Serviço não definido</option>{servicos.filter(sv=>sv.ativo!==false).sort((a,b)=>((a.categoria||'Sem categoria')+' '+a.nome).localeCompare((b.categoria||'Sem categoria')+' '+b.nome)).map(sv=><option key={sv.id} value={sv.id}>{sv.categoria||'Sem categoria'} — {sv.nome}</option>)}</select></div>
        <div className="field" style={{marginBottom:0}}><label>Data de preferência</label><input type="date" value={f.dataPreferencia} onChange={e=>s('dataPreferencia',e.target.value)}/></div>
      </div>
      <div className="field"><label>Observação</label><input value={f.observacao} onChange={e=>s('observacao',e.target.value)} placeholder="Ex: qualquer horário após 14h"/></div>
      <button className="btn btn-primary" onClick={add}>Adicionar à fila</button>
    </div>
    <div style={{marginBottom:16}}><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar na fila por cliente, serviço, data ou observação..."/></div>
    {filtrada.length===0?<div className="card" style={{textAlign:'center',padding:48,color:'var(--muted)'}}><div style={{fontSize:32,marginBottom:12}}>⏳</div><div style={{fontWeight:600}}>Nenhum cliente na fila</div></div>:
    <div style={{display:'grid',gap:10}}>{filtrada.map(item=>{
      const cli=clientes.find(c=>c.id===item.clienteId);
      const status=item.status||'aguardando';
      const badge=status==='aguardando'?'badge-yellow':status==='contactado'?'badge-blue':status==='agendado'?'badge-green':'badge-muted';
      return <div key={item.id} className="card" style={{padding:'14px 16px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12,flexWrap:'wrap'}}>
          <div style={{flex:1,minWidth:220}}>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}><span style={{fontWeight:800,fontSize:14}}>{item.clienteNome||cli?.nome||'Cliente'}</span><span className={'badge '+badge}>{status}</span>{cli&&<NoShowBadge cliente={cli}/>}</div>
            <div style={{fontSize:12,color:'var(--muted)',marginTop:6}}>Serviço: <b style={{color:'var(--text)'}}>{servNome(item.servicoId)}</b> · Data: <b style={{color:'var(--text)'}}>{item.dataPreferencia||'—'}</b></div>
            {item.observacao&&<div style={{fontSize:12,color:'var(--muted2)',marginTop:5}}>Obs: {item.observacao}</div>}
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'flex-end'}}>
            <button className="btn btn-xs btn-success" onClick={()=>avisarWhatsApp(item)}>Avisar (WhatsApp)</button>
            <button className="btn btn-xs btn-secondary" onClick={()=>updateStatus(item.id,'contactado')}>Contactado</button>
            <button className="btn btn-xs btn-primary" onClick={()=>{onAgendar&&onAgendar(item);updateStatus(item.id,'agendado');}}>Agendar</button>
            <button className="btn btn-xs btn-danger" onClick={()=>updateStatus(item.id,'removido')}>Remover</button>
          </div>
        </div>
      </div>;
    })}</div>}
  </div>;
}

/* ── PATCH B: CONFIGURAÇÕES — Formas de pagamento ── */
function FormaPagtoEditor({forma,onSave}){
  const[open,setOpen]=useState(false);
  const[f,setF]=useState(forma);
  const s=(k,v)=>setF(x=>({...x,[k]:v}));
  function ok(){onSave(f);setOpen(false);}
  return <div className="card" style={{marginBottom:10,padding:'14px 16px'}}>
    <div style={{display:'flex',alignItems:'center',gap:12}}>
      <span style={{fontSize:24,flexShrink:0}}>{f.icon}</span>
      <div style={{flex:1}}>
        <div style={{fontWeight:600,fontSize:14}}>{f.label}</div>
        <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>
          {f.taxaPct===0&&f.taxaFixa===0?'sem taxa':''}{f.taxaPct>0?f.taxaPct+'%':''}{f.taxaPct>0&&f.taxaFixa>0?' + ':''}{f.taxaFixa>0?fmtR$(f.taxaFixa):''}
          {f.diasRecebimento>0?' · '+f.diasRecebimento+' dia'+(f.diasRecebimento!==1?'s':''):''}
        </div>
      </div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <label style={{display:'flex',alignItems:'center',gap:6,fontSize:12,cursor:'pointer',color:'var(--muted2)'}}>
          <input type="checkbox" checked={f.ativo!==false} onChange={e=>{const nf={...f,ativo:e.target.checked};setF(nf);onSave(nf);}} style={{width:'auto'}}/>Ativo
        </label>
        <button className="btn btn-xs btn-secondary" onClick={()=>setOpen(!open)}>{open?'Fechar':'Editar'}</button>

function mesInicioStr(){const d=new Date();return fmtDate(new Date(d.getFullYear(),d.getMonth(),1));}
function clampPct(v){return Math.max(0,Math.min(100,Number(v)||0));}
function safeDiv(a,b){return b?((Number(a)||0)/(Number(b)||0)):0;}
function dateRangeStr(inicio,fim,limite=62){
  if(!inicio||!fim)return[];
  const out=[];const d=new Date(inicio+'T12:00:00');const end=new Date(fim+'T12:00:00');let guard=0;
  while(d<=end&&guard<limite){out.push(fmtDate(d));d.setDate(d.getDate()+1);guard++;}
  return out;
}
function estimateAgValor(ag,servicos,profissionais){
  const sv=servicos.find(s=>s.id===ag.servicoId);const prof=profissionais.find(p=>p.id===ag.profissionalId);
  return getServicoValor(sv,prof)||Number(sv?.valor||0)||0;
}
function estimateAgDuracao(ag,servicos,profissionais){
  const sv=servicos.find(s=>s.id===ag.servicoId);const prof=profissionais.find(p=>p.id===ag.profissionalId);
  return getServicoDuracao(sv,prof)||Number(sv?.duracao||30)||30;
}

      </div>
      <div className="card"><div className="section-title">Agenda por horário</div>
        {agendaBase.heatRows.length===0?<div style={{textAlign:'center',padding:24,color:'var(--muted)'}}>Sem agenda no período.</div>:agendaBase.heatRows.slice(0,10).map(r=><div key={r.hora} style={{display:'grid',gridTemplateColumns:'46px 1fr 86px',gap:10,alignItems:'center',padding:'6px 0'}}><div style={{fontSize:12,fontWeight:800}}>{r.hora}:00</div><V9MiniBar value={r.qtd} max={topHeat}/><div style={{fontSize:12,textAlign:'right',color:'var(--muted2)'}}>{r.qtd} ag.</div></div>)}
      </div>
    </div>
  </div>;
}

function migrarCaixaGorjetaBruta(){
  const caixa=load(KEYS.caixa)||[];
  const comandos=load(KEYS.comandos)||[];
  if(!caixa.length||!comandos.length)return;
  let alterou=false;
  const novos=caixa.map(m=>{
    if(m.tipo!=='gorjeta'||m.origem!=='checkout'||!m.comandoId)return m;
    const cmd=comandos.find(c=>c.id===m.comandoId);
    if(!cmd||!(cmd.gorjetaVal>0))return m;
    const valorBruto=Math.round((cmd.gorjetaVal||0)*100)/100;
    const valorRepasse=Math.round(((cmd.gorjetaStaff!==undefined?cmd.gorjetaStaff:cmd.gorjetaVal)||0)*100)/100;
    const taxa=Math.round((cmd.taxaGorjeta||0)*100)/100;
    if(Math.abs((m.valor||0)-valorBruto)<0.01&&m.valorRepasseStaff!==undefined)return m;
    alterou=true;
    return{...m,valor:valorBruto,valorRepasseStaff:valorRepasse,taxaGorjeta:taxa,
      descricao:String(m.descricao||'Gorjeta recebida').replace(/^Gorjeta\s+—/,'Gorjeta recebida —'),
      migradoGorjetaBruta:true};
  });
  if(alterou)save(KEYS.caixa,novos);
}


/* ── APP ROOT — estado reativo compartilhado ── */
function App(){
  migrarCaixaGorjetaBruta();
  const{theme,toggleTheme}=useTheme();
  const[onboarded,setOnboarded]=useState(()=>!!load(KEYS.onboarded));
  const[empresa,setEmpresa]=useState(()=>normalizarEmpresa(load(KEYS.empresa)));
  const[profissionais,setProfissionais]=useState(()=>load(KEYS.profissionais)||[]);
  const[servicos,setServicos]=useState(()=>load(KEYS.servicos)||[]);
  const[clientes,setClientes]=useState(()=>load(KEYS.clientes)||[]);
  const[page,setPage]=useState('agenda');
  const[moreOpen,setMoreOpen]=useState(false);
  const[checkoutAg,setCheckoutAg]=useState(null);
  const[agendaDraft,setAgendaDraft]=useState(null);

  useEffect(()=>save(KEYS.profissionais,profissionais),[profissionais]);
  useEffect(()=>save(KEYS.servicos,servicos),[servicos]);
  useEffect(()=>save(KEYS.clientes,clientes),[clientes]);

  if(!onboarded)return<><Onboarding onComplete={e=>{setEmpresa(e);setOnboarded(true);}}/><Toast/></>;

  function go(p){setPage(p);if(p!=='checkout')setCheckoutAg(null);setMoreOpen(false);}

  return <div className="premium-app">
    <AppTopbar page={page} empresa={empresa} theme={theme} toggleTheme={toggleTheme} onMore={()=>setMoreOpen(true)}/>
    <main className={'premium-main premium-page-'+page}>
      <div className="premium-content-island">
        {page==='agenda'&&<Agenda profissionais={profissionais} servicos={servicos} clientes={clientes} setClientes={setClientes} externalDraft={agendaDraft} onDraftConsumed={()=>setAgendaDraft(null)} onCheckout={ag=>{setCheckoutAg(ag);setPage('checkout');}} theme={theme}/>} 
        {page==='checkout'&&<Checkout agInicial={checkoutAg} profissionais={profissionais} servicos={servicos} clientes={clientes} onClose={()=>{setCheckoutAg(null);setPage('agenda');}} onConcludo={()=>setCheckoutAg(null)}/>} 
        {page==='financeiro'&&<Financeiro profissionais={profissionais}/>} 
        {page==='intelligence'&&<IntelligenceLab empresa={empresa} profissionais={profissionais} servicos={servicos} clientes={clientes}/>} 
        {page==='clientes'&&<Clientes clientes={clientes} setClientes={setClientes} onReagendar={(cliente,data)=>{setAgendaDraft({defaultDate:data||todayStr(),defaultCliente:cliente.id});setPage('agenda');}}/>} 
        {page==='servicos'&&<Servicos servicos={servicos} setServicos={setServicos} profissionais={profissionais}/>} 
        {page==='profissionais'&&<Profissionais profissionais={profissionais} setProfissionais={setProfissionais} servicos={servicos}/>} 
        {page==='waitlist'&&<Waitlist clientes={clientes} servicos={servicos} onAgendar={item=>{setAgendaDraft({defaultDate:item.dataPreferencia||todayStr(),defaultCliente:item.clienteId||'',servicoId:item.servicoId||''});setPage('agenda');}}/>} 
        {page==='configuracoes'&&<Configuracoes empresa={empresa} setEmpresa={setEmpresa}/>} 
      </div>
    </main>
    <BottomNav active={page} onChange={go} onMore={()=>setMoreOpen(true)}/>
    <MoreSheet open={moreOpen} active={page} onClose={()=>setMoreOpen(false)} onChange={go} theme={theme} toggleTheme={toggleTheme}/>
    <Toast/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
