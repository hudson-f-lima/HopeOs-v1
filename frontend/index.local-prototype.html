<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#090715"/>
<title>HOPE OS — Salão V9.2.3 Responsive Cards</title>
<script>(function(){try{var t=JSON.parse(localStorage.getItem('hope_tema')||'null')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;transition:background 0.15s,color 0.15s;}
:root{
  --bg:#0f0f11;--surface:#18181b;--surface2:#1f1f23;--border:#2a2a30;--border2:#3a3a42;
  --text:#e8e8ea;--muted:#6b6b78;--muted2:#9090a0;
  --accent:#7c6af7;--accent2:#a594ff;--accentbg:rgba(124,106,247,0.1);
  --green:#22c55e;--greenbg:rgba(34,197,94,0.1);
  --red:#ef4444;--redbg:rgba(239,68,68,0.1);
  --yellow:#f59e0b;--yellowbg:rgba(245,158,11,0.1);
  --blue:#3b82f6;--bluebg:rgba(59,130,246,0.1);
  --teal:#14b8a6;--tealbg:rgba(20,184,166,0.1);
  --orange:#f97316;--orangebg:rgba(249,115,22,0.1);
  --scrim:rgba(0,0,0,0.12);--scrim2:rgba(0,0,0,0.08);--scrim-strong:rgba(0,0,0,0.75);
  --grid-line:#34343c;
}
html[data-theme="light"]{
  --bg:#f4f4f6;--surface:#ffffff;--surface2:#f0f0f3;--border:#e2e2e8;--border2:#d2d2da;
  --text:#1a1a1f;--muted:#74748a;--muted2:#52525e;
  --accent:#6d59f0;--accent2:#5644d6;--accentbg:rgba(109,89,240,0.08);
  --green:#16a34a;--greenbg:rgba(22,163,74,0.1);
  --red:#dc2626;--redbg:rgba(220,38,38,0.08);
  --yellow:#d97706;--yellowbg:rgba(217,119,6,0.1);
  --blue:#2563eb;--bluebg:rgba(37,99,235,0.08);
  --teal:#0d9488;--tealbg:rgba(13,148,136,0.1);
  --orange:#ea580c;--orangebg:rgba(234,88,12,0.1);
  --scrim:rgba(15,15,20,0.06);--scrim2:rgba(15,15,20,0.04);--scrim-strong:rgba(15,15,20,0.45);
  --grid-line:#8e8e9e;
}
input,select,textarea{background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:9px 12px;font-size:13px;width:100%;outline:none;font-family:inherit;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentbg);}
input::placeholder,textarea::placeholder{color:var(--muted);}
select option{background:var(--surface2);color:var(--text);}
button{cursor:pointer;font-family:inherit;border:none;outline:none;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:10px 16px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,0.4);animation:slideIn 0.2s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.modal-bg{position:fixed;inset:0;background:var(--scrim-strong);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;padding:24px;}
.modal-sm{max-width:380px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;transition:all 0.15s;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:var(--accent2);}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}.btn-secondary:hover{background:var(--border);}
.btn-ghost{background:transparent;color:var(--muted2);}.btn-ghost:hover{color:var(--text);background:var(--surface2);}
.btn-danger{background:var(--redbg);color:var(--red);border:1px solid rgba(239,68,68,0.2);}.btn-danger:hover{background:var(--red);color:#fff;}
.btn-success{background:var(--greenbg);color:var(--green);border:1px solid rgba(34,197,94,0.2);}.btn-success:hover{background:var(--green);color:#fff;}
.btn-sm{padding:6px 12px;font-size:12px;}.btn-xs{padding:4px 8px;font-size:11px;border-radius:6px;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-accent{background:var(--accentbg);color:var(--accent2);}.badge-green{background:var(--greenbg);color:var(--green);}
.badge-red{background:var(--redbg);color:var(--red);}.badge-yellow{background:var(--yellowbg);color:var(--yellow);}
.badge-blue{background:var(--bluebg);color:var(--blue);}.badge-teal{background:var(--tealbg);color:var(--teal);}
.badge-orange{background:var(--orangebg);color:var(--orange);}.badge-muted{background:var(--surface2);color:var(--muted2);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:12px;}
.divider{height:1px;background:var(--border);margin:16px 0;}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.chip{display:inline-flex;align-items:center;padding:3px 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;font-size:11px;color:var(--muted2);gap:4px;}
.chip-active{background:var(--accentbg);border-color:rgba(124,106,247,0.3);color:var(--accent2);}
input[type=checkbox]{width:auto;accent-color:var(--accent);}
.tab-btn{padding:8px 14px;font-size:12px;font-weight:600;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;color:var(--muted);}
.tab-btn.active{color:var(--accent2);border-bottom-color:var(--accent);}
.pay-btn{flex:1;padding:10px 6px;border-radius:10px;border:2px solid var(--border2);background:var(--surface2);color:var(--muted2);font-size:11px;font-weight:600;transition:all 0.15s;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:66px;cursor:pointer;}
.pay-btn.active{border-color:var(--accent);background:var(--accentbg);color:var(--accent2);}
.pay-btn:hover:not(.active){background:var(--border);}
.row-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.row-item:last-child{border-bottom:none;}
.alerta-neg{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--red);}


/* ─────────────────────────────────────────────────────────────
   V9.1 PREMIUM UI SHELL — mobile-first, dark gradient + light cards
   Refatoração visual sem alterar regras de negócio, cálculos ou storage.
───────────────────────────────────────────────────────────── */
:root,html[data-theme="dark"]{
  --bg:#080713;--shell-bg:radial-gradient(circle at 18% -10%,rgba(124,106,247,0.48),transparent 32%),radial-gradient(circle at 86% 8%,rgba(165,148,255,0.24),transparent 28%),linear-gradient(145deg,#070713 0%,#141033 44%,#231150 100%);
  --surface:#ffffff;--surface2:#f6f4ff;--surface3:#ece8ff;
  --border:rgba(38,28,78,0.10);--border2:rgba(38,28,78,0.16);
  --text:#171620;--muted:#79758d;--muted2:#555168;
  --accent:#7c6af7;--accent2:#5f4de0;--accentbg:rgba(124,106,247,0.12);
  --green:#16a34a;--greenbg:rgba(22,163,74,0.10);
  --red:#dc2626;--redbg:rgba(220,38,38,0.09);
  --yellow:#d97706;--yellowbg:rgba(217,119,6,0.10);
  --blue:#2563eb;--bluebg:rgba(37,99,235,0.09);
  --teal:#0d9488;--tealbg:rgba(13,148,136,0.10);
  --orange:#ea580c;--orangebg:rgba(234,88,12,0.10);
  --scrim:rgba(16,12,38,0.08);--scrim2:rgba(16,12,38,0.05);--scrim-strong:rgba(7,7,19,0.72);
  --grid-line:rgba(38,28,78,0.18);
  --glass:rgba(255,255,255,0.14);--glass-border:rgba(255,255,255,0.22);
  --shadow-soft:0 18px 60px rgba(8,7,19,0.22);--shadow-card:0 12px 34px rgba(35,17,80,0.10);
}
html[data-theme="light"]{
  --bg:#ebe9fb;--shell-bg:radial-gradient(circle at 12% -12%,rgba(124,106,247,0.30),transparent 34%),radial-gradient(circle at 88% 0%,rgba(110,89,240,0.18),transparent 30%),linear-gradient(145deg,#f5f3ff 0%,#e8e5fb 52%,#ded9f8 100%);
  --surface:#ffffff;--surface2:#f7f6ff;--surface3:#efeaff;
  --border:rgba(42,33,88,0.10);--border2:rgba(42,33,88,0.16);
  --text:#171620;--muted:#817d91;--muted2:#565268;
  --accent:#6d59f0;--accent2:#4f3fd2;--accentbg:rgba(109,89,240,0.10);
  --scrim:rgba(25,20,48,0.06);--scrim2:rgba(25,20,48,0.04);--scrim-strong:rgba(25,20,48,0.42);
  --grid-line:rgba(42,33,88,0.18);--glass:rgba(255,255,255,0.52);--glass-border:rgba(255,255,255,0.78);
  --shadow-soft:0 18px 54px rgba(42,33,88,0.14);--shadow-card:0 12px 28px rgba(42,33,88,0.08);
}
html,body,#root{min-height:100%;}
body{background:var(--shell-bg)!important;background-attachment:fixed!important;color:var(--text);}
body:before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,0.08),transparent 20%,rgba(0,0,0,0.08));z-index:-1;}
input,select,textarea{background:var(--surface2);border-color:var(--border2);border-radius:14px;color:var(--text);min-height:42px;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(124,106,247,0.13);}
select option{background:#fff;color:#171620;}
.btn{border-radius:999px;min-height:38px;box-shadow:none;}
.btn-primary{background:linear-gradient(135deg,var(--accent),#9b8cff);box-shadow:0 10px 24px rgba(124,106,247,0.22);}
.btn-secondary{background:rgba(255,255,255,0.72);border-color:var(--border2);color:var(--text);}
.btn-secondary:hover{background:#fff;}
.btn-ghost:hover{background:rgba(124,106,247,0.10);}
.card{background:rgba(255,255,255,0.92);border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow-card);backdrop-filter:blur(12px);}
.modal{background:rgba(255,255,255,0.96);border:1px solid rgba(255,255,255,0.70);border-radius:28px;box-shadow:var(--shadow-soft);}
.modal-bg{backdrop-filter:blur(12px);}
.badge{border-radius:999px;padding:4px 10px;}
.tab-btn{border-radius:999px;border-bottom:none;margin-bottom:0;color:var(--muted2);}
.tab-btn.active{background:var(--accentbg);color:var(--accent2);border-bottom-color:transparent;}
.pay-btn{border-radius:18px;background:var(--surface2);}
.avatar{box-shadow:0 8px 20px rgba(22,20,38,0.14);}
.section-title{color:var(--muted2);}
.divider,.row-item{border-color:var(--border);}
.toast-container{bottom:104px;right:18px;}
.toast{background:rgba(255,255,255,0.96);border:1px solid rgba(255,255,255,0.65);border-radius:18px;color:var(--text);box-shadow:var(--shadow-card);}
.premium-app{min-height:100vh;background:var(--shell-bg);background-attachment:fixed;color:var(--text);}
.premium-topbar{position:sticky;top:0;z-index:80;padding:12px 14px 8px;}
.premium-topbar-inner{max-width:1320px;margin:0 auto;min-height:62px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 12px 10px 14px;border:1px solid var(--glass-border);background:linear-gradient(135deg,rgba(255,255,255,0.18),rgba(255,255,255,0.08));box-shadow:0 16px 44px rgba(0,0,0,0.16);backdrop-filter:blur(20px);border-radius:24px;color:#fff;}
.premium-brand{display:flex;align-items:center;gap:10px;min-width:0;}
.premium-logo{width:38px;height:38px;border-radius:15px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fff,rgba(255,255,255,0.58));color:#5f4de0;font-weight:900;letter-spacing:-0.05em;box-shadow:0 10px 24px rgba(0,0,0,0.12);}
.premium-title-wrap{min-width:0;}
.premium-title{font-size:16px;font-weight:900;letter-spacing:-0.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.premium-subtitle{font-size:11px;color:rgba(255,255,255,0.68);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.premium-top-actions{display:flex;align-items:center;gap:8px;}
.premium-icon-btn{width:40px;height:40px;border-radius:16px;background:rgba(255,255,255,0.16);color:#fff;border:1px solid rgba(255,255,255,0.20);display:flex;align-items:center;justify-content:center;font-size:16px;backdrop-filter:blur(12px);}
.premium-icon-btn:hover{background:rgba(255,255,255,0.24);}
.premium-main{padding:6px 14px 112px;min-height:calc(100vh - 88px);}
.premium-content-island{width:100%;max-width:1320px;margin:0 auto;border-radius:32px;background:linear-gradient(180deg,rgba(255,255,255,0.90),rgba(255,255,255,0.80));border:1px solid rgba(255,255,255,0.60);box-shadow:var(--shadow-soft);backdrop-filter:blur(18px);overflow:hidden;}
.premium-page-agenda .premium-content-island{padding:0;}
.premium-page-checkout .premium-content-island{max-width:1040px;}
.premium-page-intelligence .premium-content-island{max-width:1240px;}
.premium-bottom-nav-wrap{position:fixed;left:0;right:0;bottom:0;z-index:90;padding:12px 12px calc(12px + env(safe-area-inset-bottom));pointer-events:none;}
.premium-bottom-nav{pointer-events:auto;max-width:620px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:8px;border-radius:28px;background:rgba(13,10,34,0.74);border:1px solid rgba(255,255,255,0.20);box-shadow:0 22px 70px rgba(0,0,0,0.34);backdrop-filter:blur(22px);}
.premium-nav-btn{height:58px;border-radius:22px;background:transparent;color:rgba(255,255,255,0.62);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;font-weight:700;letter-spacing:-0.01em;}
.premium-nav-btn span:first-child{font-size:18px;line-height:1;}
.premium-nav-btn.active{background:linear-gradient(135deg,rgba(124,106,247,0.92),rgba(165,148,255,0.78));color:#fff;box-shadow:0 10px 24px rgba(124,106,247,0.26);}
.premium-nav-btn.more-active{background:rgba(255,255,255,0.14);color:#fff;}
.premium-sheet-backdrop{position:fixed;inset:0;z-index:460;background:rgba(7,7,19,0.42);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;padding:16px 12px calc(94px + env(safe-area-inset-bottom));}
.premium-sheet{width:100%;max-width:620px;background:rgba(255,255,255,0.96);border:1px solid rgba(255,255,255,0.70);box-shadow:0 24px 80px rgba(0,0,0,0.24);border-radius:30px;padding:12px;color:var(--text);}
.premium-sheet-handle{width:54px;height:5px;border-radius:999px;background:rgba(23,22,32,0.14);margin:4px auto 14px;}
.premium-sheet-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;padding:0 4px;}
.premium-sheet-title{font-size:15px;font-weight:900;letter-spacing:-0.03em;}
.premium-sheet-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.premium-more-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.premium-more-btn{min-height:66px;border-radius:22px;background:var(--surface2);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;gap:10px;padding:12px;text-align:left;}
.premium-more-btn.active{background:var(--accentbg);border-color:rgba(124,106,247,0.30);color:var(--accent2);}
.premium-more-ico{width:36px;height:36px;border-radius:15px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 18px rgba(35,17,80,0.08);font-size:17px;}
.premium-more-label{font-size:13px;font-weight:800;line-height:1.15;}
.premium-more-meta{font-size:10px;color:var(--muted);margin-top:3px;}
.premium-theme-row{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;gap:8px;}
.premium-theme-row .btn{flex:1;}
.agenda-premium-root{height:calc(100vh - 190px)!important;min-height:560px;}
@media (min-width:900px){
  .premium-topbar{padding:18px 22px 10px;}
  .premium-main{padding:10px 22px 122px;}
  .premium-content-island{border-radius:36px;}
  .premium-bottom-nav-wrap{padding-bottom:18px;}
}
@media (max-width:680px){
  .premium-topbar{padding:10px 10px 6px;}
  .premium-topbar-inner{border-radius:22px;min-height:58px;padding:9px 10px;}
  .premium-title{font-size:14px;}
  .premium-subtitle{font-size:10px;max-width:190px;}
  .premium-logo{width:36px;height:36px;border-radius:14px;}
  .premium-main{padding:6px 10px 104px;}
  .premium-content-island{border-radius:28px;}
  .premium-nav-btn{height:54px;border-radius:20px;font-size:9px;}
  .premium-nav-btn span:first-child{font-size:17px;}
  .premium-more-grid{grid-template-columns:1fr;}
  .field-row,.field-row3{grid-template-columns:1fr!important;}
  .modal{border-radius:26px;padding:20px;}
  .toast-container{left:12px;right:12px;bottom:98px;}
  .agenda-premium-root{height:calc(100vh - 172px)!important;min-height:520px;}
}


/* ─────────────────────────────────────────────────────────────
   V9.2.4 CALENDAR DAY GRID PATCH
   Agenda vertical: mini semana no topo + grade diária horário x colaborador.
   Não altera checkout, financeiro, dashboard, storage ou regras de negócio.
───────────────────────────────────────────────────────────── */
@media (max-width:680px){
  .agenda-premium-root{min-height:560px!important;}
}

/* ─────────────────────────────────────────────────────────────
   V9.2.3 RESPONSIVE CARDS PATCH
   Correção cirúrgica: grids Bento e cards redimensionam por viewport.
   Não altera cálculo, checkout, storage ou regras financeiras.
───────────────────────────────────────────────────────────── */
.card{min-width:0;max-width:100%;overflow-wrap:anywhere;word-break:normal;}
.card>*{min-width:0;}
.premium-content-island{max-width:min(1320px,calc(100vw - 28px));}
.premium-main>*,.premium-content-island>*{min-width:0;}

/* Dashboard e filtros: quebra responsiva real, mesmo quando JSX usa inline style */
@media (max-width:1024px){
  div[style*="minmax(220px, 0.7fr)"],
  div[style*="minmax(220px,0.7fr)"],
  div[style*="minmax(260px, 1.3fr)"],
  div[style*="minmax(260px,1.3fr)"]{grid-template-columns:1fr!important;}
}
@media (max-width:860px){
  .premium-main{padding-left:10px!important;padding-right:10px!important;}
  .premium-content-island{max-width:calc(100vw - 20px);border-radius:28px!important;}
  div[style*="minmax(150px, 1fr)"],
  div[style*="minmax(150px,1fr)"],
  div[style*="minmax(170px, 1fr)"],
  div[style*="minmax(170px,1fr)"]{grid-template-columns:repeat(2,minmax(0,1fr))!important;}
  div[style*="minmax(260px, 1fr)"],
  div[style*="minmax(260px,1fr)"]{grid-template-columns:1fr!important;}
}
@media (max-width:560px){
  .premium-main{padding-left:8px!important;padding-right:8px!important;padding-bottom:106px!important;}
  .premium-content-island{max-width:calc(100vw - 16px);border-radius:24px!important;overflow:visible!important;}
  .card{border-radius:20px!important;padding:14px!important;}
  div[style*="minmax(130px, 1fr)"],
  div[style*="minmax(130px,1fr)"],
  div[style*="minmax(132px, 1fr)"],

function weekDates(base){const d=new Date(base),day=d.getDay(),mon=new Date(d);mon.setDate(d.getDate()-day+(day===0?-6:1));return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x;});}
function normSearch(v){return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();}
function editDistance(a,b){
  a=normSearch(a);b=normSearch(b);
  if(a===b)return 0;if(!a)return b.length;if(!b)return a.length;
  const prev=Array.from({length:b.length+1},(_,i)=>i);
  for(let i=1;i<=a.length;i++){
    let last=prev[0];prev[0]=i;
    for(let j=1;j<=b.length;j++){
      const tmp=prev[j];
      prev[j]=Math.min(prev[j]+1,prev[j-1]+1,last+(a[i-1]===b[j-1]?0:1));
      last=tmp;
    }
  }
  return prev[b.length];
}
function fuzzyMatch(query,values){
  const q=normSearch(query);if(!q)return true;
  const text=normSearch(Array.isArray(values)?values.filter(Boolean).join(' '):values);
  if(!text)return false;if(text.includes(q))return true;
  return q.split(/\s+/).every(tok=>{
    if(!tok)return true;if(text.includes(tok))return true;
    if(tok.length<=2)return text.split(/\s+/).some(w=>w.startsWith(tok));
    const max=tok.length<=4?1:2;
    return text.split(/\s+/).some(w=>w.includes(tok)||tok.includes(w)||editDistance(tok,w)<=max);
  });
}

/* ── SMART GAP MVP — recomendação visual, sem bloqueio ── */
function profissionalAtendeData(prof,dataStr){
  if(!prof||!dataStr)return true;
  const d=new Date(dataStr+'T12:00:00');
  const k=DIA_KEY[d.getDay()];
  return !!(prof.horario&&prof.horario[k]&&prof.horario[k].ativo);
}
function profissionalInicioFim(prof,dataStr,empresa){
  const d=new Date(dataStr+'T12:00:00');
  const empDia=horarioEmpresaDoDia(empresa,d);
  const empInicio=empDia.ativo?timeToMinutes(empDia.abre):timeToMinutes('08:00');
  const empFim=empDia.ativo?timeToMinutes(empDia.fecha):timeToMinutes('20:00');
  if(!prof||!dataStr)return{inicio:empInicio,fim:empFim};
  const h=prof.horario&&prof.horario[DIA_KEY[d.getDay()]];
  if(!h||!h.ativo)return{inicio:empInicio,fim:empFim};
  const profInicio=timeToMinutes(h.inicio||'08:00');
  const profFim=timeToMinutes(h.fim||'20:00');
  if(!empDia.ativo)return{inicio:profInicio,fim:profFim};
  return{inicio:Math.max(empInicio,profInicio),fim:Math.min(empFim,profFim)};
}
function agendamentoIntervaloMin(ag,servicos,profissionais){
  const sv=servicos.find(x=>x.id===ag.servicoId);
  const prof=profissionais.find(x=>x.id===ag.profissionalId);
  const inicio=timeToMinutes(ag.horario);
  const dur=getServicoDuracao(sv,prof)||30;
  return{inicio,fim:inicio+dur,duracao:dur};
}
function intervalosSobrepoem(a,b){return a.inicio<b.fim&&b.inicio<a.fim;}
function smartGapClass(c){
  if(!c)return{cls:'badge-muted',label:'Manual'};
  if(c.tipo==='recommended')return{cls:'badge-green',label:'Recomendado'};
  if(c.tipo==='hole')return{cls:'badge-orange',label:'Cria buraco'};
  return{cls:'badge-blue',label:'Sem buraco'};
}
function calcularSmartGapCandidates({data,sequencia,ags,servicos,profissionais,empresa,excludeGrupoId}){
  if(!data||!sequencia||sequencia.length===0)return[];
  const validos=sequencia.filter(it=>it.prof&&it.serv&&it.duracao>0);
  if(validos.length!==sequencia.length)return[];
  const durTotal=validos.reduce((s,it)=>s+(it.duracao||0),0);
  const maiorSlot=Math.max(5,validos.reduce((m,it)=>Math.max(m,it.slot||0),0)||Number(empresa?.slotPadrao||30)||30);
  const dataObj=new Date(data+'T12:00:00');
  const empDia=horarioEmpresaDoDia(empresa,dataObj);
  let empInicio=timeToMinutes(empDia.abre||'08:00');
  let empFim=timeToMinutes(empDia.fecha||'20:00');
  if(!empDia.ativo){
    const ranges=validos.map(it=>profissionalInicioFim(it.prof,data,empresa)).filter(r=>r&&r.fim>r.inicio);
    if(!ranges.length)return[];
    empInicio=Math.min(...ranges.map(r=>r.inicio));
    empFim=Math.max(...ranges.map(r=>r.fim));
  }
  const existentes=(ags||[]).filter(a=>a.data===data&&!['cancelado','no_show'].includes(a.status)&&(!excludeGrupoId||a.grupoId!==excludeGrupoId));
  let offset=0;
  const blueprint=validos.map(it=>{const bp={profissionalId:it.profissionalId,duracao:it.duracao,offset,prof:it.prof};offset+=it.duracao;return bp;});
  const fimMax=empFim-durTotal;
  const out=[];
  for(let start=empInicio;start<=fimMax;start+=maiorSlot){
    const intervals=blueprint.map(bp=>({profissionalId:bp.profissionalId,inicio:start+bp.offset,fim:start+bp.offset+bp.duracao,prof:bp.prof}));
    let impossivel=false;
    for(const iv of intervals){
      if(!profissionalAtendeData(iv.prof,data)){impossivel=true;break;}
      const bounds=profissionalInicioFim(iv.prof,data,empresa);
      if(iv.inicio<bounds.inicio||iv.fim>bounds.fim){impossivel=true;break;}
      const ex=existentes.filter(a=>a.profissionalId===iv.profissionalId).map(a=>agendamentoIntervaloMin(a,servicos,profissionais));
      if(ex.some(e=>intervalosSobrepoem(iv,e))){impossivel=true;break;}
    }
    if(impossivel)continue;
    let score=50,touches=0,holes=0,reasons=[];
    for(const iv of intervals){
      const bounds=profissionalInicioFim(iv.prof,data,empresa);
      const ex=existentes.filter(a=>a.profissionalId===iv.profissionalId).map(a=>agendamentoIntervaloMin(a,servicos,profissionais)).sort((a,b)=>a.inicio-b.inicio);
      const prev=ex.filter(e=>e.fim<=iv.inicio).sort((a,b)=>b.fim-a.fim)[0];
      const next=ex.filter(e=>e.inicio>=iv.fim).sort((a,b)=>a.inicio-b.inicio)[0];
      const gapBefore=prev?iv.inicio-prev.fim:iv.inicio-bounds.inicio;
      const gapAfter=next?next.inicio-iv.fim:bounds.fim-iv.fim;
      const touchBefore=gapBefore===0;
      const touchAfter=gapAfter===0;
      if(touchBefore){touches++;score+=25;}
      if(touchAfter){touches++;score+=25;}
      if(gapBefore>0&&gapBefore<maiorSlot){holes++;score-=30;reasons.push(`buraco antes ${gapBefore}min`);}
      if(gapAfter>0&&gapAfter<maiorSlot){holes++;score-=30;reasons.push(`buraco depois ${gapAfter}min`);}
      if(!touchBefore&&!touchAfter&&gapBefore>=maiorSlot&&gapAfter>=maiorSlot)score+=5;
    }
    const tipo=holes>0?'hole':touches>0?'recommended':'neutral';
    const hora=minutesToTime(start);
    const fim=minutesToTime(start+durTotal);
    if(tipo==='recommended')reasons.unshift('cola com atendimento existente');
    if(tipo==='neutral')reasons.unshift('não cria buraco pequeno');
    out.push({hora,fim,score,tipo,maiorSlot,durTotal,holes,touches,reason:reasons.slice(0,2).join(' · ')});
  }
  return out.sort((a,b)=>{
    const w={recommended:0,neutral:1,hole:2};
    return (w[a.tipo]-w[b.tipo])||(b.score-a.score)||a.hora.localeCompare(b.hora);
  }).slice(0,18);
}

/* ── PATCH C: Pipeline de cálculo ──
  1. valorBruto (por item)
  2. − desconto proporcional
  3. gorjeta 100% staff, separado
  4. taxa pgto sobre valorComDesconto
  5. comissão por modelo:
     Bruto Salão: base=valorComDesconto, taxa paga pela empresa
     Dividido:    base=valorComDesconto−taxaItem, taxa dividida
     Bruto Staff: base=valorComDesconto, taxa descontada da comissão do staff
  6. Comissão negativa → bloqueio
*/
function round2(n){return Math.round((Number(n)||0)*100)/100;}
function calcTaxaItem(valorBase,forma){
  if(!forma)return 0;
  return round2((valorBase*(forma.taxaPct||0)/100)+(forma.taxaFixa||0));
}
function calcItemPipeline(it,prof,serv,forma,descontoProporção,taxaItemOverride){
  const ov=prof&&prof.overrides&&prof.overrides[serv?.id];
  const pct=ov&&ov.comissao!==undefined&&ov.comissao!==''?Number(ov.comissao):(serv?.comissao||0);
  const modelo=prof?.modeloComissao||'bruto_salao';
  const valorComDesconto=round2(Math.max(0,it.valor-(it.valor*descontoProporção)));
  const taxaItem=round2(typeof taxaItemOverride==='number'?taxaItemOverride:calcTaxaItem(valorComDesconto,forma));
  let comissaoVal=0,baseCalculo=0,receitaEmpresa=0;
  if(modelo==='bruto_salao'){
    baseCalculo=valorComDesconto;
    comissaoVal=round2(baseCalculo*pct/100);
    receitaEmpresa=round2(valorComDesconto-comissaoVal-taxaItem);
  } else if(modelo==='dividido'){
    baseCalculo=Math.max(0,valorComDesconto-taxaItem);
    comissaoVal=round2(baseCalculo*pct/100);
    receitaEmpresa=round2(valorComDesconto-comissaoVal-taxaItem);
  } else if(modelo==='bruto_staff'){
    baseCalculo=valorComDesconto;
    comissaoVal=round2(baseCalculo*pct/100-taxaItem);
    // bruto_staff: taxa é descontada da comissão; empresa fica com valor - comissão bruta.
    receitaEmpresa=round2(valorComDesconto-comissaoVal-taxaItem);
  }
  const negativo=comissaoVal<0;
  return{...it,valorComDesconto,taxaItem,
    comissaoVal:round2(comissaoVal),receitaEmpresa:Math.max(0,round2(receitaEmpresa)),pct,modelo,negativo};
}
function buildPayments({formaId,formaAtual,mistoVals,totalReceber,formas}){
  if(formaId==='misto'){
    return Object.entries(mistoVals||{}).map(([fid,vStr])=>{
      const forma=formas.find(f=>f.id===fid);
      const valor=parseMoney(vStr||'0');
      return forma&&valor>0?{id:uid(),formaId:fid,formaLabel:forma.label,icon:forma.icon,valor,taxa:calcTaxaItem(valor,forma),diasRecebimento:forma.diasRecebimento||0}:null;
    }).filter(Boolean);
  }
  const forma=formaAtual||formas[0];
  return totalReceber>0&&forma?[{id:uid(),formaId:forma.id,formaLabel:forma.label,icon:forma.icon,valor:round2(totalReceber),taxa:calcTaxaItem(totalReceber,forma),diasRecebimento:forma.diasRecebimento||0}]:[];
}
function splitTaxaPagamento(payments,valorServicos,gorjetaVal){
  const taxaTotal=round2((payments||[]).reduce((s,p)=>s+(p.taxa||0),0));
  const baseTotal=round2((valorServicos||0)+(gorjetaVal||0));
  if(baseTotal<=0||taxaTotal<=0)return{taxaTotal,taxaServico:0,taxaGorjeta:0};
  const taxaServico=round2(taxaTotal*(valorServicos||0)/baseTotal);
  const taxaGorjeta=round2(taxaTotal-taxaServico);
  return{taxaTotal,taxaServico,taxaGorjeta};
}
function allocateByValue(total,itens,key='valorComDesconto'){
  total=round2(total);
  const base=(itens||[]).reduce((s,it)=>s+(Number(it[key])||0),0);
  if(total<=0||base<=0)return (itens||[]).map(()=>0);
  const raw=itens.map(it=>total*(Number(it[key])||0)/base);
  const rounded=raw.map(round2);
  let diff=round2(total-rounded.reduce((s,v)=>s+v,0));
  if(Math.abs(diff)>=0.01){
    let idx=0;raw.forEach((v,i)=>{if(v>raw[idx])idx=i;});
    rounded[idx]=round2(rounded[idx]+diff);
  }
  return rounded;
}
function splitTipHybrid(gorjetaVal,taxaGorjeta,itensCalc,profissionais,servicos){
  gorjetaVal=round2(gorjetaVal);taxaGorjeta=round2(taxaGorjeta);
  if(gorjetaVal<=0)return[];
  const map=new Map();
  (itensCalc||[]).forEach(it=>{
    const prof=profissionais.find(p=>p.id===it.profissionalId);
    const sv=servicos.find(s=>s.id===it.servicoId);
    if(!prof||!sv)return;
    const dur=Number(getServicoDuracao(sv,prof)||sv.duracao||0);
    const cur=map.get(prof.id)||{profissionalId:prof.id,profissionalNome:prof.nome,valor:0,tempo:0,peso:0};
    cur.valor=round2(cur.valor+(it.valorComDesconto||0));
    cur.tempo+=dur;
    map.set(prof.id,cur);
  });
  const arr=[...map.values()];
  if(!arr.length)return[];
  if(arr.length===1){
    const taxa=round2(taxaGorjeta);
    return[{...arr[0],peso:1,gorjetaBruta:gorjetaVal,taxaGorjeta:taxa,gorjetaLiquida:Math.max(0,round2(gorjetaVal-taxa)),criterio:'100% profissional único'}];
  }
  const totalValor=arr.reduce((s,x)=>s+x.valor,0);
  const totalTempo=arr.reduce((s,x)=>s+x.tempo,0);
  arr.forEach(x=>{
    const pesoValor=totalValor>0?x.valor/totalValor:0;
    const pesoTempo=totalTempo>0?x.tempo/totalTempo:0;
    x.peso=totalValor>0&&totalTempo>0?(pesoValor*0.70+pesoTempo*0.30):(totalValor>0?pesoValor:pesoTempo);
    x.pesoValor=pesoValor;x.pesoTempo=pesoTempo;
  });
  const basePeso=arr.reduce((s,x)=>s+x.peso,0)||1;
  let brutos=arr.map(x=>round2(gorjetaVal*x.peso/basePeso));
  let diff=round2(gorjetaVal-brutos.reduce((s,v)=>s+v,0));
  if(Math.abs(diff)>=0.01){let idx=0;arr.forEach((x,i)=>{if(x.peso>arr[idx].peso)idx=i;});brutos[idx]=round2(brutos[idx]+diff);}
  let taxas=arr.map((x,i)=>round2(taxaGorjeta*(brutos[i]||0)/(gorjetaVal||1)));
  diff=round2(taxaGorjeta-taxas.reduce((s,v)=>s+v,0));
  if(Math.abs(diff)>=0.01){let idx=0;brutos.forEach((v,i)=>{if(v>brutos[idx])idx=i;});taxas[idx]=round2(taxas[idx]+diff);}
  return arr.map((x,i)=>({...x,peso:round2(x.peso/basePeso),pesoValor:round2(x.pesoValor),pesoTempo:round2(x.pesoTempo),gorjetaBruta:brutos[i],taxaGorjeta:taxas[i],gorjetaLiquida:Math.max(0,round2(brutos[i]-taxas[i])),criterio:totalValor>0&&totalTempo>0?'híbrido 70% valor + 30% tempo':(totalValor>0?'valor líquido':'tempo')}));
}


/* ── V9.2.1 FINANCE READ MODEL ÚNICO ──
   Regra: checkout grava; read model interpreta; telas só exibem.
   Corrige pagamento misto em dashboard, financeiro, filtros e Intelligence.
*/
function financePaymentsFromCommand(c){
  const formas=loadFormas();
  const byId={};formas.forEach(f=>byId[f.id]=f);
  const totalReceber=round2(c.totalReceber!==undefined?c.totalReceber:((c.total||0)+(c.gorjetaVal||0)));
  const legacyForma=byId[c.formaId]||{};
  const raw=(c.payments&&c.payments.length)?c.payments:[{formaId:c.formaId||'legacy',formaLabel:c.forma||legacyForma.label||c.formaId||'—',valor:totalReceber,taxa:c.taxaPgto||0,diasRecebimento:legacyForma.diasRecebimento||0}];
  return raw.map(p=>{
    const forma=byId[p.formaId]||{};
    const valor=round2(p.valor||0);
    const taxa=round2(p.taxa!==undefined?p.taxa:calcTaxaItem(valor,forma));
    return{...p,formaId:p.formaId||'legacy',formaLabel:p.formaLabel||forma.label||p.formaId||'—',icon:p.icon||forma.icon||'💳',valor,taxa,diasRecebimento:p.diasRecebimento!==undefined?p.diasRecebimento:(forma.diasRecebimento||0)};
  }).filter(p=>p.valor>0);
}
function financeCommandMatches(c,filters={}){
  if(filters.inicio&&c.data<filters.inicio)return false;
  if(filters.fim&&c.data>filters.fim)return false;
  if(filters.prof&&!(c.itens||[]).some(it=>it.profissionalId===filters.prof))return false;
  if(filters.modelo&&!(c.itens||[]).some(it=>it.modelo===filters.modelo))return false;
  return true;
}
function buildFinanceReadModel({cmds=[],profissionais=[],clientes=[],filters={}}={}){
  const commandFacts=[],paymentFacts=[],itemFacts=[],tipFacts=[];
  const porProf={},porForma={},porModelo={};
  const clientesSet=new Set();
  const profNome=id=>profissionais.find(p=>p.id===id)?.nome||'Sem profissional';
  const initProf=(id,nome)=>porProf[id]||(porProf[id]={id,nome:nome||profNome(id),total:0,comissao:0,gorjeta:0,qtd:0,clientes:new Set(),modelo:'—'});
  let totals={total:0,entrada:0,comissao:0,empresa:0,gorjeta:0,gorjetaBruta:0,taxa:0,taxaServico:0,taxaGorjeta:0,qtd:0,itensQtd:0,clientesAtendidos:0,ticketMedio:0};
  const commands=[];
  (cmds||[]).forEach(c=>{
    if(!financeCommandMatches(c,filters))return;
    const payments=financePaymentsFromCommand(c);
    const paymentsFiltered=filters.forma?payments.filter(p=>p.formaId===filters.forma):payments;
    if(filters.forma&&paymentsFiltered.length===0)return;
    const entradaFull=round2(c.totalReceber!==undefined?c.totalReceber:((c.total||0)+(c.gorjetaVal||0)));
    const entradaSelected=round2(paymentsFiltered.reduce((s,p)=>s+p.valor,0));
    const scale=filters.forma?safeDiv(entradaSelected,entradaFull||payments.reduce((s,p)=>s+p.valor,0)||1):1;
    commands.push(c);
    if(c.clienteId)clientesSet.add(c.clienteId);
    const fact={raw:c,id:c.id,data:c.data,hora:c.hora,clienteId:c.clienteId,scale,payments:paymentsFiltered,
      total:round2((c.total||0)*scale),entrada:round2((entradaFull||0)*scale),comissao:round2((c.totalComissao||0)*scale),empresa:round2((c.receitaEmpresa||0)*scale),
      gorjeta:round2(((c.gorjetaStaff!==undefined?c.gorjetaStaff:c.gorjetaVal)||0)*scale),gorjetaBruta:round2((c.gorjetaVal||0)*scale),
      taxa:round2((c.taxaPgto||0)*scale),taxaServico:round2((c.taxaServico||0)*scale),taxaGorjeta:round2((c.taxaGorjeta||0)*scale),
      formaResumo:paymentsFiltered.map(p=>p.formaLabel).join(' + ')};
    commandFacts.push(fact);
    totals.total=round2(totals.total+fact.total);totals.entrada=round2(totals.entrada+fact.entrada);totals.comissao=round2(totals.comissao+fact.comissao);totals.empresa=round2(totals.empresa+fact.empresa);
    totals.gorjeta=round2(totals.gorjeta+fact.gorjeta);totals.gorjetaBruta=round2(totals.gorjetaBruta+fact.gorjetaBruta);totals.taxa=round2(totals.taxa+fact.taxa);totals.taxaServico=round2(totals.taxaServico+fact.taxaServico);totals.taxaGorjeta=round2(totals.taxaGorjeta+fact.taxaGorjeta);totals.qtd+=1;
    const baseServicoGorjeta=round2((c.total||0)+(c.gorjetaVal||0));
    paymentsFiltered.forEach(p=>{
      const taxaServico=baseServicoGorjeta>0?round2(p.taxa*(c.total||0)/baseServicoGorjeta):0;
      const taxaGorjeta=round2((p.taxa||0)-taxaServico);
      paymentFacts.push({comandoId:c.id,data:c.data,hora:c.hora,clienteId:c.clienteId,...p,taxaServico,taxaGorjeta});
      const key=p.formaLabel||p.formaId||'—';
      if(!porForma[key])porForma[key]={label:key,formaId:p.formaId,valor:0,taxa:0,qtd:0};
      porForma[key].valor=round2(porForma[key].valor+p.valor);porForma[key].taxa=round2(porForma[key].taxa+p.taxa);porForma[key].qtd+=1;
    });
    (c.itens||[]).forEach((it,idx)=>{
      if(filters.prof&&it.profissionalId!==filters.prof)return;
      if(filters.modelo&&it.modelo!==filters.modelo)return;
      const item={...it,_cmd:c,_idx:idx,comandoId:c.id,data:c.data,hora:c.hora,clienteId:c.clienteId,
        valorComDesconto:round2((it.valorComDesconto!==undefined?it.valorComDesconto:(it.valor||0))*scale),
        valor:round2((it.valor||0)*scale),comissaoVal:round2((it.comissaoVal||0)*scale),taxaItem:round2((it.taxaItem||0)*scale),receitaEmpresa:round2((it.receitaEmpresa||0)*scale)};
      itemFacts.push(item);totals.itensQtd+=1;
      const id=item.profissionalId||'sem_prof';const p=initProf(id);p.modelo=item.modelo||p.modelo;p.total=round2(p.total+(item.valorComDesconto||0));p.comissao=round2(p.comissao+(item.comissaoVal||0));p.qtd+=1;if(c.clienteId)p.clientes.add(c.clienteId);
      const mod=item.modelo||'—';porModelo[mod]=round2((porModelo[mod]||0)+(item.comissaoVal||0));
    });
    (c.gorjetaDistribuicao||[]).forEach(g=>{
      if(filters.prof&&g.profissionalId!==filters.prof)return;
      const tip={...g,comandoId:c.id,data:c.data,hora:c.hora,clienteId:c.clienteId,gorjetaBruta:round2((g.gorjetaBruta||0)*scale),taxaGorjeta:round2((g.taxaGorjeta||0)*scale),gorjetaLiquida:round2((g.gorjetaLiquida||0)*scale)};
      tipFacts.push(tip);const p=initProf(tip.profissionalId,tip.profissionalNome);p.gorjeta=round2(p.gorjeta+(tip.gorjetaLiquida||0));
    });
  });
  totals.clientesAtendidos=clientesSet.size;totals.ticketMedio=safeDiv(totals.total,totals.qtd);
  return{commands,commandFacts,paymentFacts,itemFacts,tipFacts,totals:{...totals,porProf,porForma,porModelo},porProf,porForma,porModelo};
}
function calcFinanceReconciliation(rm){
  const entradaPayments=round2((rm.paymentFacts||[]).reduce((s,p)=>s+(p.valor||0),0));
  const entradaCmds=round2(rm.totals.entrada||0);
  return{entradaPayments,entradaCmds,diff:round2(entradaPayments-entradaCmds),ok:Math.abs(entradaPayments-entradaCmds)<0.01};
}

                <span style={{flex:1,fontSize:13,fontWeight:sel?600:400}}>{sv.nome}</span>
