/* ── PATCH A: AGENDA — lê profissionais reativos via props ── */
const STATUS_COLOR={agendado:'#3b82f6',confirmado:'#22c55e',em_atendimento:'#f59e0b',concluido:'#6b7280',cancelado:'#ef4444',no_show:'#7c3aed'};
const STATUS_COLOR_LIGHT={agendado:'#1d4ed8',confirmado:'#15803d',em_atendimento:'#b45309',concluido:'#4b5563',cancelado:'#b91c1c',no_show:'#6d28d9'};
function statusColor(status,theme){return((theme==='light'?STATUS_COLOR_LIGHT:STATUS_COLOR)[status])||(theme==='light'?STATUS_COLOR_LIGHT.agendado:STATUS_COLOR.agendado);}
const STATUS_LABEL={agendado:'Agendado',confirmado:'Confirmado',em_atendimento:'Em atend.',concluido:'Concluído',cancelado:'Cancelado',no_show:'No-show'};

function ModalAgendamento({ag,profissionais,clientes,servicos,defaultDate,defaultProf,defaultHour,defaultCliente,defaultServico,onSave,onClose}){
  const isEdit=!!(ag&&ag.id);
  const base={id:ag?.id||uid(),clienteId:ag?.clienteId||defaultCliente||'',data:ag?.data||defaultDate||todayStr(),horario:ag?.horario||defaultHour||'08:00',status:ag?.status||'agendado',observacoes:ag?.observacoes||''};
  const[f,setF]=useState(base);
  const[itemForm,setItemForm]=useState({profissionalId:defaultProf||ag?.profissionalId||'',servicoId:defaultServico||ag?.servicoId||''});
  const[smartPick,setSmartPick]=useState(null);
  const[itens,setItens]=useState(()=>{
    if(ag&&ag.id)return[{id:ag.id,profissionalId:ag.profissionalId||'',servicoId:ag.servicoId||''}];
    if(defaultServico||defaultProf)return[{id:uid(),profissionalId:defaultProf||'',servicoId:defaultServico||''}].filter(x=>x.profissionalId||x.servicoId);
    return[];
  });
  const s=(k,v)=>setF(x=>({...x,[k]:v}));
  const clienteSel=clientes.find(c=>c.id===f.clienteId);
  const servsAdd=useMemo(()=>{
    if(!itemForm.profissionalId)return servicos.filter(sv=>sv.ativo!==false);
    const p=profissionais.find(x=>x.id===itemForm.profissionalId);
    if(!p||!(p.servicosVinculados||[]).length)return servicos.filter(sv=>sv.ativo!==false);
    return servicos.filter(sv=>p.servicosVinculados.includes(sv.id)&&sv.ativo!==false);
  },[itemForm.profissionalId,profissionais,servicos]);
  function itemInfo(item,idx,accMin){
    const prof=profissionais.find(p=>p.id===item.profissionalId);
    const serv=servicos.find(sv=>sv.id===item.servicoId);
    const duracao=getServicoDuracao(serv,prof)||0;
    const slot=getServicoSlot(serv);
    const valor=getServicoValor(serv,prof);
    const inicio=addMinutesToTime(f.horario,accMin);
    const fim=addMinutesToTime(inicio,duracao);
    return{...item,idx,prof,serv,duracao,slot,valor,inicio,fim};
  }
  let acc=0;
  const sequencia=itens.map((it,idx)=>{const info=itemInfo(it,idx,acc);acc+=info.duracao;return info;});
  const duracaoTotal=sequencia.reduce((sum,it)=>sum+(it.duracao||0),0);
  const maiorSlot=sequencia.reduce((max,it)=>Math.max(max,it.slot||0),0);
  const totalEstimado=sequencia.reduce((sum,it)=>sum+(it.valor||0),0);
  const smartCandidates=!isEdit?calcularSmartGapCandidates({data:f.data,sequencia,ags:load(KEYS.agendamentos)||[],servicos,profissionais,empresa:normalizarEmpresa(load(KEYS.empresa)),excludeGrupoId:ag?.grupoId}):[];
  const selectedSmartCandidate=smartPick&&smartPick.hora===f.horario?smartPick:null;
  function addItem(){
    if(!itemForm.profissionalId){toast('Selecione o profissional','error');return;}
    if(!itemForm.servicoId){toast('Selecione o serviço','error');return;}
    setItens(prev=>[...prev,{id:uid(),profissionalId:itemForm.profissionalId,servicoId:itemForm.servicoId}]);
    setSmartPick(null);
    setItemForm({profissionalId:'',servicoId:''});
    toast('Serviço adicionado ao carrinho');
  }
  function removeItem(id){if(isEdit&&itens.length<=1){toast('Edição direta mantém o bloco atual','warn');return;}setItens(prev=>prev.filter(x=>x.id!==id));setSmartPick(null);}
  function ok(){
    if(itens.length===0){toast('Adicione pelo menos um serviço ao carrinho','error');return;}
    const invalido=sequencia.find(it=>!it.prof||!it.serv);
    if(invalido){toast('Carrinho possui profissional ou serviço inválido','error');return;}
    const gapMeta=selectedSmartCandidate;
    const origemAgendamento=gapMeta&&gapMeta.tipo!=='hole'?'smart_gap_recommended':'manual';
    if(isEdit){
      const it=sequencia[0];
      onSave({...ag,clienteId:f.clienteId,profissionalId:it.profissionalId,servicoId:it.servicoId,data:f.data,horario:f.horario,status:f.status,observacoes:f.observacoes,grupoSeq:ag.grupoSeq||1,grupoTotal:ag.grupoTotal||1,grupoDuracaoTotal:it.duracao,grupoMaiorSlot:it.slot});
      onClose();
      return;
    }
    const grupoId=uid();
    const now=new Date().toISOString();
    const payload=sequencia.map((it,idx)=>({
      id:uid(),grupoId,grupoSeq:idx+1,grupoTotal:sequencia.length,
      clienteId:f.clienteId,profissionalId:it.profissionalId,servicoId:it.servicoId,
      data:f.data,horario:it.inicio,status:'agendado',observacoes:f.observacoes,
      grupoInicio:f.horario,grupoDuracaoTotal:duracaoTotal,grupoMaiorSlot:maiorSlot,
      origemAgendamento,gapScore:gapMeta?.score||null,gapClass:gapMeta?.tipo||null,gapHint:gapMeta?.reason||null,
      criadoEm:now
    }));
    onSave(payload);onClose();
  }
  return <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal" style={{maxWidth:680}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}><h2 style={{margin:0,fontSize:16,fontWeight:700}}>{isEdit?'Editar bloco':'Novo agendamento · Carrinho'}</h2><button className="btn btn-ghost btn-xs" onClick={onClose}>✕</button></div>
      <div className="field"><label>Cliente (opcional)</label>
        <select value={f.clienteId} onChange={e=>s('clienteId',e.target.value)}>
          <option value="">Sem cliente definido / walk-in</option>
          {clientes.map(c=><option key={c.id} value={c.id}>{c.nome}{c.whatsapp?' — '+c.whatsapp:''}</option>)}
        </select>
        {clienteSel&&<NoShowAlert cliente={clienteSel}/>}        
      </div>
      <div className="field-row">
        <div className="field" style={{marginBottom:0}}><label>Data</label><input type="date" value={f.data} onChange={e=>s('data',e.target.value)}/></div>
        <div className="field" style={{marginBottom:0}}><label>Hora inicial</label><input type="time" value={f.horario} onChange={e=>{s('horario',e.target.value);setSmartPick(null);}}/></div>
      </div>
      {isEdit&&<div className="field" style={{marginTop:14}}><label>Status</label>
        <select value={f.status} onChange={e=>s('status',e.target.value)}>
          {Object.entries(STATUS_LABEL).map(([v,l])=><option key={v} value={v}>{l}</option>)}
        </select>
      </div>}
      {!isEdit&&<div className="card" style={{marginTop:16,background:'var(--surface2)'}}>
        <div className="section-title">Adicionar serviço ao carrinho</div>
        <div className="field-row">
          <div className="field" style={{marginBottom:0}}><label>Profissional</label>
            <select value={itemForm.profissionalId} onChange={e=>setItemForm(fm=>({...fm,profissionalId:e.target.value,servicoId:''}))}>
              <option value="">Selecione...</option>
              {profissionais.filter(p=>p.ativo!==false).map(p=><option key={p.id} value={p.id}>{p.nome}</option>)}
            </select>
          </div>
          <div className="field" style={{marginBottom:0}}><label>Serviço</label>
            <select value={itemForm.servicoId} onChange={e=>setItemForm(fm=>({...fm,servicoId:e.target.value}))}>
              <option value="">Selecione...</option>
              {servsAdd.map(sv=><option key={sv.id} value={sv.id}>{sv.categoria||'Sem categoria'} — {sv.nome}</option>)}
            </select>
          </div>
        </div>
        <button className="btn btn-secondary btn-sm" style={{marginTop:12,width:'100%'}} onClick={addItem}>+ Adicionar ao carrinho</button>
      </div>}
      <div className="card" style={{marginTop:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,gap:8,flexWrap:'wrap'}}>
          <div className="section-title" style={{marginBottom:0}}>Sequência do atendimento</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            <span className="badge badge-accent">{duracaoTotal}min físico</span>
            <span className="badge badge-teal">Maior slot: {maiorSlot}min</span>
            <span className="badge badge-green">{fmtR$(totalEstimado)}</span>
          </div>
        </div>
        {sequencia.length===0?<div style={{fontSize:13,color:'var(--muted)',textAlign:'center',padding:'18px 0'}}>Nenhum serviço no carrinho.</div>:
        <div style={{display:'grid',gap:8}}>{sequencia.map((it,idx)=>{
          const modelo=MODELOS_COM.find(m=>m.id===(it.prof?.modeloComissao||'bruto_salao'));
          return <div key={it.id} style={{display:'flex',gap:10,alignItems:'center',padding:'10px 12px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:10,flexWrap:'wrap'}}>
            <div style={{width:54,flexShrink:0}}><div style={{fontSize:10,color:'var(--muted)'}}>#{idx+1}</div><div style={{fontWeight:800,color:'var(--accent2)'}}>{it.inicio}</div><div style={{fontSize:10,color:'var(--muted)'}}>até {it.fim}</div></div>
            <div style={{flex:1,minWidth:180}}><div style={{fontWeight:700,fontSize:13}}>{it.serv?.nome||'Serviço não selecionado'}</div><div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{it.prof?.nome||'Profissional não selecionado'} · {it.duracao}min · slot {it.slot}min</div><div style={{fontSize:11,color:modelo?.cor||'var(--muted)',marginTop:2}}>{modelo?.icon} {modelo?.label||'Modelo'}</div></div>
            <div style={{fontWeight:800,color:'var(--green)'}}>{fmtR$(it.valor||0)}</div>
            {!isEdit&&<button className="btn btn-xs btn-danger" onClick={()=>removeItem(it.id)}>✕</button>}
          </div>;
        })}</div>}
      </div>
      {!isEdit&&sequencia.length>0&&<div className="card" style={{marginTop:16,border:'1px solid rgba(124,106,247,0.22)',background:'rgba(124,106,247,0.04)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:10}}>
          <div>
            <div className="section-title" style={{marginBottom:4}}>Smart Gap · prevenção de buracos</div>
            <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.45}}>Sugestões usam o maior slot do carrinho ({maiorSlot||0}min). A recepção pode escolher qualquer horário.</div>
          </div>
          {selectedSmartCandidate&&<span className={'badge '+smartGapClass(selectedSmartCandidate).cls}>Selecionado: {smartGapClass(selectedSmartCandidate).label}</span>}
        </div>
        {smartCandidates.length===0?<div style={{fontSize:12,color:'var(--muted)',padding:'10px 0'}}>Sem sugestão disponível para este carrinho nesta data. Use o horário manual acima.</div>:
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(132px,1fr))',gap:8}}>
          {smartCandidates.map(c=>{const klass=smartGapClass(c);return <button key={c.hora} className="btn btn-secondary btn-sm" onClick={()=>{s('horario',c.hora);setSmartPick(c);}} style={{justifyContent:'flex-start',alignItems:'stretch',flexDirection:'column',gap:4,borderColor:selectedSmartCandidate&&selectedSmartCandidate.hora===c.hora?'var(--accent)':'var(--border2)',background:selectedSmartCandidate&&selectedSmartCandidate.hora===c.hora?'var(--accentbg)':'var(--surface2)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:4,width:'100%'}}><b style={{fontSize:14}}>{c.hora}</b><span className={'badge '+klass.cls} style={{fontSize:9}}>{klass.label}</span></div>
            <div style={{fontSize:10,color:'var(--muted)',fontWeight:500,textAlign:'left'}}>até {c.fim} · score {c.score}</div>
            <div style={{fontSize:10,color:'var(--muted2)',fontWeight:400,textAlign:'left',lineHeight:1.25}}>{c.reason}</div>
          </button>;})}
        </div>}
      </div>}
      <div className="field" style={{marginTop:14}}><label>Observações do grupo</label><textarea rows={2} value={f.observacoes||''} onChange={e=>s('observacoes',e.target.value)} style={{resize:'none'}}/></div>
      <div style={{display:'flex',gap:10,marginTop:4}}><button className="btn btn-secondary" style={{flex:1}} onClick={onClose}>Cancelar</button><button className="btn btn-primary" style={{flex:1}} onClick={ok}>{isEdit?'Atualizar bloco':'Agendar carrinho'}</button></div>
    </div>
  </div>;
}

function Agenda({profissionais,servicos,clientes,setClientes,onCheckout,externalDraft,onDraftConsumed,theme}){
  const[ags,setAgs]=useState(()=>load(KEYS.agendamentos)||[]);
  const[empresa]=useState(()=>normalizarEmpresa(load(KEYS.empresa)));
  const[currentDate,setCurrentDate]=useState(new Date());
  const[mostrarTodos,setMostrarTodos]=useState(false);
  const[modal,setModal]=useState(null);
  const[selProfs,setSelProfs]=useState([]);
  const[info,setInfo]=useState(null);
  const[noShow,setNoShow]=useState(null);
  const[noShowMotivo,setNoShowMotivo]=useState('');
  const[eventos,setEventos]=useState(()=>load(KEYS.agendamentoEventos)||[]);
  useEffect(()=>save(KEYS.agendamentos,ags),[ags]);
  useEffect(()=>save(KEYS.agendamentoEventos,eventos),[eventos]);
  useEffect(()=>{
    if(externalDraft){
      if(externalDraft.defaultDate)setCurrentDate(new Date(externalDraft.defaultDate+'T12:00:00'));
      setModal(externalDraft);
      onDraftConsumed&&onDraftConsumed();
    }
  },[externalDraft]);

  const activeProfs=profissionais.filter(p=>p.ativo!==false);
  const shownProfs=selProfs.length>0?activeProfs.filter(p=>selProfs.includes(p.id)):activeProfs;
  const today=todayStr();

  function notifyWaitlist(data){
    const fila=waitlistAtivaPorData(data);
    if(fila.length>0)toast(`Horário liberado. Existem ${fila.length} cliente${fila.length!==1?'s':''} na lista de espera para esta data.`,'warn');
    else toast('Horário liberado. Nenhum cliente na lista de espera para esta data.','info');
  }
  function incrementFaltas(clienteId){
    if(!clienteId||!setClientes)return;
    setClientes(prev=>prev.map(c=>c.id===clienteId?{...c,faltas:getFaltasCliente(c)+1}:c));
  }
  function saveAg(ag){
    if(Array.isArray(ag)){
      setAgs(p=>[...p,...ag]);
      toast(ag.length>1?`${ag.length} blocos agendados no carrinho`:'Agendado');
      return;
    }
    const anterior=ags.find(x=>x.id===ag.id);
    setAgs(p=>{const i=p.findIndex(x=>x.id===ag.id);return i>=0?p.map(x=>x.id===ag.id?ag:x):[...p,ag];});
    if(anterior&&anterior.status!==ag.status&&['cancelado','no_show'].includes(ag.status)){
      notifyWaitlist(ag.data);
      const ev={id:uid(),agendamentoId:ag.id,tipo:'status_change',statusAnterior:anterior.status,statusNovo:ag.status,motivo:'Alterado manualmente',data:todayStr(),hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),criadoEm:new Date().toISOString()};
      setEventos(p=>[...p,ev]);
      if(ag.status==='no_show')incrementFaltas(ag.clienteId);
    }
    toast(modal?.id?'Atualizado':'Agendado');
  }
  function delAg(id){setAgs(p=>p.filter(x=>x.id!==id));toast('Removido','info');setInfo(null);}
  function eventosAg(id){return eventos.filter(e=>e.agendamentoId===id).sort((a,b)=>String(b.criadoEm).localeCompare(String(a.criadoEm)));}
  function confirmarNoShow(){
    if(!noShow)return;
    const hora=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const grupo= noShow.grupoId ? ags.filter(a=>a.grupoId===noShow.grupoId&&a.status!=='no_show') : [noShow];
    const ids=new Set(grupo.map(a=>a.id));
    const clienteNoShow=clientes.find(c=>c.id===noShow.clienteId);
    const faltasDepois=clienteNoShow?getFaltasCliente(clienteNoShow)+1:0;
    const evs=grupo.map(a=>({id:uid(),agendamentoId:a.id,tipo:'status_change',statusAnterior:a.status,statusNovo:'no_show',motivo:noShowMotivo||'Cliente não compareceu',data:todayStr(),hora,criadoEm:new Date().toISOString()}));
    setAgs(p=>p.map(a=>ids.has(a.id)?{...a,status:'no_show'}:a));
    setEventos(p=>[...p,...evs]);
    incrementFaltas(noShow.clienteId);
    notifyWaitlist(noShow.data);
    if(clienteNoShow){
      const abriu=abrirWhatsAppCliente(clienteNoShow,msgNoShowDanny(clienteNoShow,faltasDepois));
      if(!abriu)toast('No-show registrado. Cliente sem WhatsApp cadastrado.','warn');
    }
    if(info&&info.ag&&ids.has(info.ag.id))setInfo({...info,ag:{...info.ag,status:'no_show'},cli:clienteNoShow||info.cli});
    setNoShow(null);setNoShowMotivo('');toast(grupo.length>1?'Combo marcado como no-show':'No-show registrado','warn');
  }

  function startOfWeekSunday(base){const d=new Date(base);d.setHours(12,0,0,0);d.setDate(d.getDate()-d.getDay());return d;}
  function weekDatesSunday(base){const ini=startOfWeekSunday(base);return Array.from({length:7},(_,i)=>{const x=new Date(ini);x.setDate(ini.getDate()+i);return x;});}
  function prevWeek(){const d=new Date(currentDate);d.setDate(d.getDate()-7);setCurrentDate(d);}
  function nextWeek(){const d=new Date(currentDate);d.setDate(d.getDate()+7);setCurrentDate(d);}
  function goToday(){setCurrentDate(new Date());}
  function tMin(t){const[h,m]=String(t||'00:00').split(':').map(Number);return (h||0)*60+(m||0);}
  function getDur(ag){
    const sv=servicos.find(x=>x.id===ag.servicoId);
    const p=profissionais.find(x=>x.id===ag.profissionalId);
    if(!sv)return 30;
    const ov=p&&p.overrides&&p.overrides[sv.id];
    return ov&&ov.duracao?Number(ov.duracao):Number(sv.duracao||30);
  }
  function isProfOk(p,d){const k=DIA_KEY[d.getDay()];return !!(p.horario&&p.horario[k]&&p.horario[k].ativo);}
  function profBounds(p,date){
    const h=p.horario&&p.horario[DIA_KEY[date.getDay()]];
    if(!h||!h.ativo)return null;
    const emp=horarioEmpresaDoDia(empresa,date);
    const pi=timeToMinutes(h.inicio||'08:00'),pf=timeToMinutes(h.fim||'20:00');
    if(!emp.ativo)return{inicio:pi,fim:pf};
    return{inicio:Math.max(pi,timeToMinutes(emp.abre)),fim:Math.min(pf,timeToMinutes(emp.fecha))};
  }
  function profsDoDia(date){
    if(!mostrarTodos)return shownProfs.filter(p=>isProfOk(p,date));
    return shownProfs;
  }
  function rangeDoDia(date,profs){
    if(!profs.length)return null;
    const bounds=profs.map(p=>profBounds(p,date)).filter(Boolean);
    if(bounds.length)return{inicio:Math.min(...bounds.map(r=>r.inicio)),fim:Math.max(...bounds.map(r=>r.fim))};
    if(mostrarTodos)return{inicio:timeToMinutes('08:00'),fim:timeToMinutes('20:00')};
    return null;
  }
  const ROW_STEP=30;
  const ROW_H=38;
  const PROF_W=144;
  function slotRows(range){
    if(!range||range.fim<=range.inicio)return[];
    const rows=[];
    const start=Math.floor(range.inicio/ROW_STEP)*ROW_STEP;
    for(let t=start;t<range.fim;t+=ROW_STEP)rows.push({t,label:minutesToTime(t),major:t%60===0});
    return rows;
  }
  function agsAtivosDia(ds){return ags.filter(a=>a.data===ds&&!['cancelado','no_show'].includes(a.status));}
  function capacidadeDia(date,profs){return profs.reduce((s,p)=>{const b=profBounds(p,date);return s+(b?Math.max(0,b.fim-b.inicio):0);},0);}
  function ocupadoDia(ds,date,profs){const ids=new Set(profs.map(p=>p.id));return agsAtivosDia(ds).filter(a=>ids.has(a.profissionalId)).reduce((s,a)=>s+getDur(a),0);}
  function dayMeta(date){
    const ds=fmtDate(date);
    const profs=profsDoDia(date);
    const cap=capacidadeDia(date,profs);
    const busy=ocupadoDia(ds,date,profs);
    const agCount=agsAtivosDia(ds).filter(a=>profs.some(p=>p.id===a.profissionalId)).length;
    const occ=cap?Math.min(100,Math.round(busy/cap*100)):0;
    return{date,ds,profs,cap,busy,agCount,occ};
  }
  function occTone(occ){return occ>=80?'var(--green)':occ>=60?'var(--blue)':occ>=40?'var(--yellow)':'var(--red)';}

  const week=weekDatesSunday(currentDate);
  const weekMetas=week.map(dayMeta);
  const selectedDs=fmtDate(currentDate);
  const selectedMeta=dayMeta(currentDate);
  const dayProfs=selectedMeta.profs;
  const dayRange=rangeDoDia(currentDate,dayProfs);
  const daySlots=slotRows(dayRange);
  const totalHeight=daySlots.length*ROW_H;
  const gridMinWidth=64+Math.max(1,dayProfs.length)*PROF_W;
  const weekTotalAg=weekMetas.reduce((s,m)=>s+m.agCount,0);
  const weekCap=weekMetas.reduce((s,m)=>s+m.cap,0);
  const weekBusy=weekMetas.reduce((s,m)=>s+m.busy,0);
  const weekOcc=weekCap?Math.round(weekBusy/weekCap*100):0;
  const weekStart=week[0],weekEnd=week[6];
  const weekLabel=`${String(weekStart.getDate()).padStart(2,'0')}/${String(weekStart.getMonth()+1).padStart(2,'0')} a ${String(weekEnd.getDate()).padStart(2,'0')}/${String(weekEnd.getMonth()+1).padStart(2,'0')}`;
  const grupoInfo=info&&info.ag&&info.ag.grupoId?ordenarAgendamentosGrupo(ags.filter(a=>a.grupoId===info.ag.grupoId)):info?[info.ag]:[];

  return <div className="agenda-premium-root" style={{display:'flex',flexDirection:'column',height:'calc(100vh - 190px)',overflow:'hidden'}}>
    <div style={{padding:'14px 16px 10px',borderBottom:'1px solid var(--border)',background:'var(--surface)',flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:10}}>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-secondary btn-sm" onClick={prevWeek}>‹</button>
          <button className="btn btn-secondary btn-sm" onClick={goToday} style={{fontSize:11}}>Hoje</button>
          <button className="btn btn-secondary btn-sm" onClick={nextWeek}>›</button>
        </div>
        <div style={{flex:1,minWidth:160}}>
          <div style={{fontSize:15,fontWeight:900,letterSpacing:'-0.03em'}}>Semana {weekLabel}</div>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{weekTotalAg} agendamentos · {weekOcc}% ocupação semanal · Dia: {fmtDisplay(currentDate)}</div>
        </div>
        <button className={'btn btn-sm '+(mostrarTodos?'btn-primary':'btn-secondary')} onClick={()=>setMostrarTodos(v=>!v)} style={{fontSize:12}} title={mostrarTodos?'Mostrando todos os profissionais, inclusive fora de operação.':'Mostrando só quem atende no dia selecionado.'}>{mostrarTodos?'👁 Todos':'◉ Disponíveis'}</button>
        <button className="btn btn-primary btn-sm" onClick={()=>setModal({defaultDate:selectedDs})}>+ Agendar</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,minmax(74px,1fr))',gap:7,overflowX:'auto',paddingBottom:2}}>
        {weekMetas.map(m=>{
          const active=m.ds===selectedDs;
          const isToday=m.ds===today;
          return <button key={m.ds} onClick={()=>setCurrentDate(new Date(m.ds+'T12:00:00'))}
            style={{minWidth:74,borderRadius:18,padding:'9px 6px',border:'1px solid '+(active?'rgba(124,106,247,0.55)':'var(--border)'),background:active?'var(--accentbg)':'var(--surface2)',boxShadow:active?'0 10px 24px rgba(124,106,247,0.16)':'none',color:'var(--text)',textAlign:'center'}}>
            <div style={{fontSize:10,fontWeight:800,color:active?'var(--accent2)':'var(--muted2)',textTransform:'uppercase'}}>{DAYS_PT[m.date.getDay()]}</div>
            <div style={{fontSize:18,fontWeight:900,lineHeight:1.1,marginTop:2}}>{String(m.date.getDate()).padStart(2,'0')}</div>
            <div style={{height:4,borderRadius:999,background:'var(--border)',margin:'7px 8px 5px',overflow:'hidden'}}><div style={{height:'100%',width:Math.min(100,m.occ)+'%',background:occTone(m.occ),borderRadius:999}}/></div>
            <div style={{fontSize:9,color:'var(--muted)',lineHeight:1.15}}>{m.agCount} ag. · {m.occ}%</div>
            {isToday&&<div style={{fontSize:9,color:'var(--accent2)',fontWeight:800,marginTop:3}}>Hoje</div>}
          </button>;
        })}
      </div>
    </div>
    {activeProfs.length>1&&<div style={{padding:'8px 16px',borderBottom:'1px solid var(--border)',display:'flex',gap:6,flexWrap:'nowrap',overflowX:'auto',background:'var(--surface)',flexShrink:0}}>
      <button className={'btn btn-xs '+(selProfs.length===0?'btn-primary':'btn-secondary')} onClick={()=>setSelProfs([])}>Todos</button>
      {activeProfs.map(p=><button key={p.id} className={'btn btn-xs '+(selProfs.includes(p.id)?'btn-primary':'btn-secondary')}
        onClick={()=>setSelProfs(ps=>ps.includes(p.id)?ps.filter(x=>x!==p.id):[...ps,p.id])} style={{display:'flex',alignItems:'center',gap:5,whiteSpace:'nowrap'}}>
        <div className="avatar" style={{width:16,height:16,fontSize:8,background:avatarColor(p.nome),color:'#fff'}}>{initials(p.nome)}</div>{p.nome}
      </button>)}
    </div>}
    {(shownProfs.length===0||!dayRange||dayProfs.length===0)
      ?<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12,color:'var(--muted)',padding:24,textAlign:'center'}}>
        <div style={{fontSize:40}}>📅</div><div style={{fontSize:15,fontWeight:700}}>Nenhum profissional disponível neste dia</div>
        <div style={{fontSize:13}}>Use “Todos” para visualizar colaboradores fora de operação ou ajuste a escala.</div>
      </div>
      :<div style={{overflow:'auto',flex:1,background:'linear-gradient(180deg,rgba(255,255,255,0.20),rgba(255,255,255,0.04))'}}>
        <div style={{minWidth:gridMinWidth+'px'}}>
          <div style={{display:'flex',position:'sticky',top:0,zIndex:30,background:'rgba(255,255,255,0.94)',backdropFilter:'blur(14px)',borderBottom:'1px solid var(--border)'}}>
            <div style={{width:64,flexShrink:0,position:'sticky',left:0,zIndex:40,background:'rgba(255,255,255,0.96)',borderRight:'1px solid var(--border)',padding:'10px 6px',fontSize:10,fontWeight:900,color:'var(--muted)',textAlign:'center'}}>Hora</div>
            {dayProfs.map(p=>{
              const b=profBounds(p,currentDate);
              const atende=!!b;
              return <div key={p.id+'-head'} style={{flex:'0 0 '+PROF_W+'px',minWidth:PROF_W,borderRight:'1px solid var(--border)',padding:'8px 8px',display:'flex',alignItems:'center',gap:8,background:atende?'transparent':'var(--scrim2)'}}>
                <div className="avatar" style={{width:30,height:30,fontSize:11,background:avatarColor(p.nome),color:'#fff'}}>{initials(p.nome)}</div>
                <div style={{minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:900,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.nome}</div>
                  <div style={{fontSize:10,color:atende?'var(--muted)':'var(--red)',whiteSpace:'nowrap'}}>{atende?`${minutesToTime(b.inicio)}–${minutesToTime(b.fim)}`:'Fora'}</div>
                </div>
              </div>;
            })}
          </div>
          <div style={{display:'flex',position:'relative',minHeight:totalHeight}}>
            <div style={{width:64,flexShrink:0,position:'sticky',left:0,zIndex:20,background:'rgba(255,255,255,0.94)',borderRight:'1px solid var(--border)'}}>
              {daySlots.map(r=><div key={r.t} style={{height:ROW_H,borderBottom:'1px solid '+(r.major?'var(--grid-line)':'var(--border)'),padding:'4px 6px',fontSize:10,fontWeight:r.major?800:600,color:r.major?'var(--muted2)':'var(--muted)',display:'flex',alignItems:'flex-start',justifyContent:'flex-end'}}>{r.label}</div>)}
            </div>
            {dayProfs.map(p=>{
              const bounds=profBounds(p,currentDate);
              const foraOperacao=!bounds;
              const agD=ags.filter(a=>a.profissionalId===p.id&&a.data===selectedDs&&a.status!=='cancelado');
              return <div key={p.id+'-body'} style={{flex:'0 0 '+PROF_W+'px',minWidth:PROF_W,minHeight:totalHeight,position:'relative',borderRight:'1px solid var(--border)',background:foraOperacao?'var(--scrim2)':'transparent'}}>
                {daySlots.map(r=>{
                  const dentro=bounds&&r.t>=bounds.inicio&&r.t<bounds.fim;
                  const label=r.major?minutesToTime(r.t):'';
                  return <div key={r.t} style={{height:ROW_H,borderBottom:'1px solid '+(r.major?'var(--grid-line)':'var(--border)'),background:dentro?'transparent':'var(--scrim2)',cursor:dentro?'pointer':'default'}}
                    onClick={()=>dentro&&setModal({defaultDate:selectedDs,defaultProf:p.id,defaultHour:label||minutesToTime(r.t)})}
                    onMouseEnter={e=>{if(dentro)e.currentTarget.style.background='rgba(124,106,247,0.08)';}}
                    onMouseLeave={e=>{if(dentro)e.currentTarget.style.background='transparent';}}/>;
                })}
                {foraOperacao&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',textAlign:'center',padding:10,color:'var(--muted2)',fontSize:11,fontWeight:800,pointerEvents:'none'}}>Fora de operação</div>}
                {agD.map(ag=>{
                  const dur=getDur(ag);
                  const start=tMin(ag.horario);
                  if(start<dayRange.inicio||start>=dayRange.fim)return null;
                  const top=((start-dayRange.inicio)/ROW_STEP)*ROW_H;
                  const height=Math.max((dur/ROW_STEP)*ROW_H,28);
                  const cli=clientes.find(c=>c.id===ag.clienteId);
                  const sv=servicos.find(x=>x.id===ag.servicoId);
                  const cor=statusColor(ag.status,theme);
                  return <div key={ag.id} onClick={e=>{e.stopPropagation();setInfo({ag,cli,sv,p});}}
                    style={{position:'absolute',top:top+2,left:4,right:4,height:Math.max(24,height-4),background:cor+'22',border:'1px solid '+cor+'66',borderLeft:'4px solid '+cor,borderRadius:10,padding:'5px 7px',cursor:'pointer',overflow:'hidden',zIndex:10,boxShadow:'0 8px 18px rgba(0,0,0,0.08)'}}>
                    <div style={{fontSize:11,fontWeight:900,color:cor,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{ag.horario} · {cli?.nome||'Sem cliente'}</div>
                    {height>42&&<div style={{fontSize:10,color:'var(--muted)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',marginTop:2}}>{sv?.nome||'Serviço'}{ag.grupoId?` · combo ${ag.grupoSeq||''}/${ag.grupoTotal||''}`:''}</div>}
                  </div>;
                })}
              </div>;
            })}
          </div>
        </div>
      </div>}
    {info&&<div className="modal-bg" onClick={()=>setInfo(null)}>
      <div className="modal modal-sm" style={{padding:24}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
          <div><div style={{fontSize:16,fontWeight:700}}>{info.cli?.nome||'Sem cliente'}</div><div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{info.ag.data} às {info.ag.horario}</div></div>
          <button className="btn btn-ghost btn-xs" onClick={()=>setInfo(null)}>✕</button>
        </div>
        {info.cli&&<div style={{marginBottom:12}}><NoShowAlert cliente={info.cli}/></div>}
        <div style={{display:'grid',gap:8,marginBottom:16}}>
          {[['Serviço',info.sv?.nome||'—'],['Profissional',info.p?.nome||'—']].map(([l,v])=>(
            <div key={l} style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span style={{color:'var(--muted)'}}>{l}</span><strong>{v}</strong></div>
          ))}
          <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span style={{color:'var(--muted)'}}>Status</span><span className="badge" style={{background:statusColor(info.ag.status,theme)+'22',color:statusColor(info.ag.status,theme)}}>{STATUS_LABEL[info.ag.status]}</span></div>
          {info.ag.gapClass&&<div style={{display:'flex',justifyContent:'space-between',fontSize:13,alignItems:'center',gap:8}}><span style={{color:'var(--muted)'}}>Smart Gap</span><span className={'badge '+smartGapClass({tipo:info.ag.gapClass}).cls}>{smartGapClass({tipo:info.ag.gapClass}).label}{info.ag.gapScore?` · ${info.ag.gapScore}`:''}</span></div>}
        </div>
        {grupoInfo.length>1&&<div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:12,marginBottom:14}}>
          <div style={{fontSize:10,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>Combo do agendamento</div>
          {grupoInfo.map(g=>{const sv=servicos.find(x=>x.id===g.servicoId);const p=profissionais.find(x=>x.id===g.profissionalId);return <div key={g.id} style={{fontSize:12,color:'var(--muted2)',display:'flex',justifyContent:'space-between',gap:10,marginBottom:5}}><span>#{g.grupoSeq} · {g.horario} · {sv?.nome||'Serviço'}</span><b style={{color:'var(--text)'}}>{p?.nome||'—'}</b></div>;})}
        </div>}
        {eventosAg(info.ag.id).length>0&&<div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:12,marginBottom:14}}>
          <div style={{fontSize:10,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>Histórico do agendamento</div>
          {eventosAg(info.ag.id).map(ev=><div key={ev.id} style={{fontSize:12,color:'var(--muted2)',marginBottom:4}}>• {ev.data} {ev.hora} — status alterado para {STATUS_LABEL[ev.statusNovo]||ev.statusNovo}{ev.motivo?` · ${ev.motivo}`:''}</div>)}
        </div>}
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-danger btn-sm" onClick={()=>delAg(info.ag.id)}>Remover</button>
          <button className="btn btn-secondary btn-sm" onClick={()=>{setModal(info.ag);setInfo(null);}}>Editar</button>
          {info.ag.status!=='no_show'&&info.ag.status!=='concluido'&&<button className="btn btn-secondary btn-sm" onClick={()=>{setNoShow(info.ag);setNoShowMotivo('');}}>Marcar no-show</button>}
          <button className="btn btn-success btn-sm" onClick={()=>{onCheckout(grupoInfo.length>1?grupoInfo:info.ag);setInfo(null);}}>💳 Checkout</button>
          {info.cli?.whatsapp&&<a href={'https://wa.me/55'+info.cli.whatsapp.replace(/\D/g,'')} target="_blank" rel="noreferrer"><button className="btn btn-success btn-sm">WA</button></a>}
        </div>
      </div>
    </div>}
    {noShow&&<div className="modal-bg" onClick={()=>setNoShow(null)}><div className="modal modal-sm" onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>Marcar no-show?</div>
      <div style={{fontSize:13,color:'var(--muted)',marginBottom:14}}>Esse registro não apaga o histórico do agendamento.</div>
      <div className="field"><label>Motivo / observação</label><textarea rows={3} value={noShowMotivo} onChange={e=>setNoShowMotivo(e.target.value)} placeholder="Cliente não compareceu" style={{resize:'none'}}/></div>
      <div style={{display:'flex',gap:10}}><button className="btn btn-secondary" style={{flex:1}} onClick={()=>setNoShow(null)}>Cancelar</button><button className="btn btn-danger" style={{flex:1}} onClick={confirmarNoShow}>Registrar no-show</button></div>
    </div></div>}
    {modal!==null&&<ModalAgendamento ag={modal.id?modal:null} profissionais={profissionais} clientes={clientes} servicos={servicos}
      defaultDate={modal.defaultDate} defaultProf={modal.defaultProf} defaultHour={modal.defaultHour} defaultCliente={modal.defaultCliente} defaultServico={modal.servicoId}
      onSave={saveAg} onClose={()=>setModal(null)}/>}
  </div>;
}

/* ── PATCH B+C: CHECKOUT — pipeline completo ── */
function Checkout({agInicial,profissionais,clientes,servicos,onClose,onConcludo}){
  const formas=loadFormas().filter(f=>f.ativo!==false);
  const[ags]=useState(()=>load(KEYS.agendamentos)||[]);
  const inicialLista=Array.isArray(agInicial)?ordenarAgendamentosGrupo(agInicial):(agInicial?[agInicial]:[]);
  const[agSel,setAgSel]=useState(inicialLista.length?inicialLista:null);

  function buildItem(sv,p){
    const ov=p&&p.overrides&&p.overrides[sv.id];
    const valor=ov&&ov.valor?parseMoney(ov.valor):sv.valor||0;
    return{id:uid(),servicoId:sv.id,profissionalId:p.id,descricao:sv.nome,valor,valorStr:fmtMoney(String(Math.round(valor*100)))};
  }
  function itensFromAgs(lista){return ordenarAgendamentosGrupo(lista).map(ag=>{const sv=servicos.find(x=>x.id===ag.servicoId);const p=profissionais.find(x=>x.id===ag.profissionalId);return sv&&p?buildItem(sv,p):null;}).filter(Boolean);}

  const[itens,setItens]=useState(()=>inicialLista.length?itensFromAgs(inicialLista):[]);

  const[desconto,setDesconto]=useState({tipo:'percentual',valor:''});
  const[gorjeta,setGorjeta]=useState({tipo:'valor',valor:''});
  const[formaId,setFormaId]=useState('dinheiro');
  const[mistoVals,setMistoVals]=useState({});
  const[recebido,setRecebido]=useState('');
  const[obs,setObs]=useState('');
  const[addServId,setAddServId]=useState('');
  const[addProfId,setAddProfId]=useState('');

  const formaAtual=formas.find(f=>f.id===formaId)||formas[0];

  /* Pipeline completo — V9.2.2 Smart Dashboard: payments[], taxa rateada, comissão por item e gorjeta híbrida */
  const calc=useMemo(()=>{
    const subtotal=round2(itens.reduce((s,i)=>s+(i.valor||0),0));
    const descontoVal=round2(desconto.tipo==='percentual'
      ?subtotal*(Number(desconto.valor)||0)/100
      :(Number(desconto.valor)||0));
    const propDesconto=subtotal>0?Math.min(1,descontoVal/subtotal):0;
    const valorComDesconto=round2(Math.max(0,subtotal-descontoVal));
    const gorjetaVal=round2(gorjeta.tipo==='percentual'
      ?subtotal*(Number(gorjeta.valor)||0)/100
      :(Number(gorjeta.valor)||0));
    const totalReceberCalc=round2(valorComDesconto+gorjetaVal);

    const payments=buildPayments({formaId,formaAtual,mistoVals,totalReceber:totalReceberCalc,formas});
    const paymentTotal=round2(payments.reduce((s,p)=>s+(p.valor||0),0));
    const paymentDiff=round2(paymentTotal-totalReceberCalc);
    const {taxaTotal,taxaServico,taxaGorjeta}=splitTaxaPagamento(payments,valorComDesconto,gorjetaVal);

    const itensBase=itens.map(it=>{
      const sv=servicos.find(x=>x.id===it.servicoId);
      const p=profissionais.find(x=>x.id===it.profissionalId);
      const valorItem=round2(Math.max(0,it.valor-(it.valor*propDesconto)));
      return{it,sv,p,valorItem};
    });
    const taxasItens=allocateByValue(taxaServico,itensBase.map(x=>({valorComDesconto:x.valorItem})),'valorComDesconto');
    const itensCalc=itensBase.map((x,i)=>calcItemPipeline(x.it,x.p,x.sv,formaAtual,propDesconto,taxasItens[i]||0));

    const totalComissao=round2(itensCalc.reduce((s,i)=>s+(i.comissaoVal||0),0));
    const temNegativo=itensCalc.some(i=>i.negativo);
    const receitaServico=round2(itensCalc.reduce((s,i)=>s+(i.receitaEmpresa||0),0));

    const gorjetaDistribuicao=splitTipHybrid(gorjetaVal,taxaGorjeta,itensCalc,profissionais,servicos);
    const gorjetaStaff=round2(gorjetaDistribuicao.reduce((s,g)=>s+(g.gorjetaLiquida||0),0));
    const gorjetaBrutaStaff=round2(gorjetaDistribuicao.reduce((s,g)=>s+(g.gorjetaBruta||0),0));
    const temGorjetaSemDono=gorjetaVal>0&&gorjetaDistribuicao.length===0;
    const temGorjetaNegativa=gorjetaDistribuicao.some(g=>g.gorjetaLiquida<0);
    const receitaEmpresa=Math.max(0,receitaServico); // gorjeta é trânsito e não entra no faturamento do salão

    return{
      subtotal,descontoVal,valorComDesconto,totalReceberCalc,
      gorjetaVal,gorjetaStaff,gorjetaBrutaStaff,gorjetaDistribuicao,taxaGorjeta,taxaGorjetaEmpresa:0,
      taxaServico,taxaTotal,payments,paymentTotal,paymentDiff,
      totalComissao,receitaEmpresa,
      itensCalc,temNegativo,temGorjetaSemDono,temGorjetaNegativa,
      modeloDom:null
    };
  },[itens,desconto,gorjeta,formaAtual,formaId,mistoVals,formas,servicos,profissionais]);

  const totalMisto=round2(Object.values(mistoVals).reduce((s,v)=>s+parseMoney(v||'0'),0));
  const totalReceber=round2((calc?.valorComDesconto||0)+(calc?.gorjetaVal||0));
  const troco=formaId==='dinheiro'&&recebido?Math.max(0,round2(parseMoney(recebido)-totalReceber)):0;

  function addItem(){
    const sv=servicos.find(x=>x.id===addServId);
    const p=profissionais.find(x=>x.id===addProfId);
    if(!sv||!p){toast('Selecione serviço e profissional','error');return;}
    setItens(prev=>[...prev,buildItem(sv,p)]);
    setAddServId('');setAddProfId('');toast('Item adicionado');
  }
  function removeItem(id){setItens(p=>p.filter(x=>x.id!==id));}
  function updateValor(id,str){setItens(prev=>prev.map(it=>it.id!==id?it:{...it,valor:parseMoney(str),valorStr:str}));}

  function finalizar(){
    if(itens.length===0){toast('Adicione pelo menos um item','error');return;}
    if(calc.temNegativo){toast('⚠ Comissão negativa — checkout bloqueado. Ajuste valor, % ou forma de pagamento.','error');return;}
    if(calc.temGorjetaSemDono){toast('Gorjeta sem profissional calculado — checkout bloqueado.','error');return;}
    const totalReceber=round2(calc.valorComDesconto+calc.gorjetaVal);
    if(formaId==='misto'&&Math.abs(totalMisto-totalReceber)>0.01){toast('Pagamento misto não fecha o total (serviço + gorjeta)','error');return;}
    if(formaId==='misto'&&calc.payments.length===0&&totalReceber>0){toast('Informe ao menos uma forma de pagamento no misto','error');return;}
    const cmd={
      id:uid(),data:todayStr(),hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
      agendamentoId:(Array.isArray(agSel)&&agSel[0])?agSel[0].id:null,agendamentoIds:Array.isArray(agSel)?agSel.map(a=>a.id):[],grupoId:(Array.isArray(agSel)&&agSel[0])?agSel[0].grupoId||null:null,clienteId:(Array.isArray(agSel)&&agSel[0])?agSel[0].clienteId||null:null,
      itens:calc.itensCalc,subtotal:calc.subtotal,descontoVal:calc.descontoVal,
      gorjetaVal:calc.gorjetaVal,gorjetaStaff:calc.gorjetaStaff,gorjetaBrutaStaff:calc.gorjetaBrutaStaff,gorjetaDistribuicao:calc.gorjetaDistribuicao,taxaGorjeta:calc.taxaGorjeta,
      taxaPgto:calc.taxaTotal,taxaServico:calc.taxaServico,
      total:calc.valorComDesconto,totalReceber,formaId,forma:formaId==='misto'?'Misto':(formaAtual?.label||formaId),
      payments:calc.payments,misto:formaId==='misto'?mistoVals:{},
      recebido:formaId==='dinheiro'?parseMoney(recebido):totalReceber,troco,
      totalComissao:calc.totalComissao,receitaEmpresa:calc.receitaEmpresa,
      obs,status:'concluido',criadoEm:new Date().toISOString(),financeEngine:'v9.2'
    };
    const cmds=load(KEYS.comandos)||[];cmds.push(cmd);save(KEYS.comandos,cmds);
    if(Array.isArray(agSel)&&agSel.length){
      const ids=new Set(agSel.map(a=>a.id));
      const list=load(KEYS.agendamentos)||[];
      save(KEYS.agendamentos,list.map(a=>ids.has(a.id)?{...a,status:'concluido'}:a));
    }
    // FIX5 — caixa registra o bruto recebido; repasse/taxa da gorjeta ficam como metadados, não como saída automática
    const caixaMov=load(KEYS.caixa)||[];
    const hora=cmd.hora;
    caixaMov.push({id:uid(),tipo:'entrada',valor:calc.valorComDesconto,origem:'checkout',comandoId:cmd.id,payments:calc.payments,
      descricao:'Venda — '+itens.map(i=>i.descricao).join(', '),data:todayStr(),hora});
    if(calc.gorjetaVal>0){
      caixaMov.push({id:uid(),tipo:'gorjeta',valor:calc.gorjetaVal,valorRepasseStaff:calc.gorjetaStaff,taxaGorjeta:calc.taxaGorjeta,gorjetaDistribuicao:calc.gorjetaDistribuicao,
        origem:'checkout',comandoId:cmd.id,descricao:'Gorjeta recebida — '+itens.map(i=>i.descricao).join(', '),data:todayStr(),hora});
    }
    save(KEYS.caixa,caixaMov);
    toast('Checkout concluído! 🎉');
    if(onConcludo)onConcludo(cmd);
    onClose();
  }

  const agsPendentes=ags.filter(a=>a.status!=='concluido'&&a.status!=='cancelado');
  const agOptions=useMemo(()=>{
    const map=new Map();
    agsPendentes.forEach(ag=>{const key=ag.grupoId?'g:'+ag.grupoId:'a:'+ag.id;if(!map.has(key))map.set(key,[]);map.get(key).push(ag);});
    return [...map.entries()].map(([key,lista])=>({key,lista:ordenarAgendamentosGrupo(lista)}));
  },[agsPendentes]);
  const agSelValue=Array.isArray(agSel)&&agSel.length?(agSel[0].grupoId?'g:'+agSel[0].grupoId:'a:'+agSel[0].id):'';
  const profAtivos=profissionais.filter(p=>p.ativo!==false);

  return <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    <div style={{padding:'16px 24px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',background:'var(--surface)',flexShrink:0}}>
      <div><h1 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.02em'}}>💳 Checkout</h1>
        <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Finalizar atendimento e registrar pagamento</div></div>
      {onClose&&<button className="btn btn-ghost btn-sm" onClick={onClose}>✕ Fechar</button>}
    </div>
    <div style={{flex:1,overflowY:'auto',padding:24}}>
      <div style={{maxWidth:720,margin:'0 auto',display:'grid',gap:16}}>

        {/* 1. Agendamento */}
        <div className="card">
          <div className="section-title">1. Agendamento (opcional)</div>
          <select value={agSelValue} onChange={e=>{
            const opt=agOptions.find(x=>x.key===e.target.value)||null;
            const lista=opt?opt.lista:null;
            setAgSel(lista);
            if(lista&&lista.length)setItens(itensFromAgs(lista));
          }}>
            <option value="">— Avulso (sem agendamento) —</option>
            {agOptions.map(opt=>{
              const first=opt.lista[0];
              const cli=clientes.find(c=>c.id===first.clienteId);
              const servs=opt.lista.map(a=>servicos.find(x=>x.id===a.servicoId)?.nome||'Serviço').join(' + ');
              return <option key={opt.key} value={opt.key}>{first.data} {first.horario} — {cli?.nome||'Sem cliente'} · {opt.lista.length>1?'Combo: ':''}{servs}</option>;
            })}
          </select>
        </div>

        {/* 2. Itens */}
        <div className="card">
          <div className="section-title">2. Itens do comando</div>
          {itens.length===0&&<div style={{fontSize:13,color:'var(--muted)',textAlign:'center',padding:'16px 0'}}>Nenhum item</div>}
          {calc.itensCalc.map(it=>{
            const p=profissionais.find(x=>x.id===it.profissionalId);
            const modelo=MODELOS_COM.find(m=>m.id===it.modelo);
            return <div key={it.id} style={{padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
              <div style={{display:'flex',alignItems:'flex-start',gap:10,flexWrap:'wrap'}}>
                <div style={{flex:1,minWidth:180}}>
                  <div style={{fontWeight:600,fontSize:13}}>{it.descricao}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>{p?.nome} · <span style={{color:modelo?.cor||'var(--accent2)',fontWeight:600}}>{modelo?.icon} {modelo?.label}</span></div>
                  <div style={{fontSize:11,marginTop:2}}>
                    Comissão: <b style={{color:it.negativo?'var(--red)':'var(--yellow)'}}>{it.negativo?'⚠ NEGATIVA':fmtR$(it.comissaoVal||0)}</b>
                    <span style={{color:'var(--muted)'}}> ({it.pct}%)</span>
                    {it.taxaItem>0&&<span style={{color:'var(--muted)'}}> · Taxa: {fmtR$(it.taxaItem)}</span>}
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
                  <div style={{width:110}}>
                    <input value={it.valorStr} onChange={e=>{const str=fmtMoney(e.target.value.replace(/\D/g,'')||'0');updateValor(it.id,str);}}
                      style={{textAlign:'right',fontWeight:700,fontSize:14,color:it.negativo?'var(--red)':'var(--green)',padding:'6px 10px'}}/>
                  </div>
                  <button className="btn btn-xs btn-danger" onClick={()=>removeItem(it.id)}>✕</button>
                </div>
              </div>
              {it.negativo&&<div className="alerta-neg" style={{marginTop:8}}>
                ⚠ Taxa da maquininha ({fmtR$(it.taxaItem)}) supera a comissão calculada ({fmtR$(it.pct/100*(it.valorComDesconto||0))}). Ajuste o valor do serviço, a % de comissão ou escolha outra forma de pagamento.
              </div>}
            </div>;
          })}
          <div style={{marginTop:12,display:'flex',gap:8,flexWrap:'wrap'}}>
            <select value={addServId} onChange={e=>setAddServId(e.target.value)} style={{flex:1,minWidth:140,fontSize:12,padding:'7px 10px'}}>
              <option value="">+ Serviço...</option>
              {servicos.filter(x=>x.ativo!==false).sort((a,b)=>((a.categoria||'Sem categoria')+' '+a.nome).localeCompare((b.categoria||'Sem categoria')+' '+b.nome)).map(sv=><option key={sv.id} value={sv.id}>{sv.categoria||'Sem categoria'} — {sv.nome}</option>)}
            </select>
            <select value={addProfId} onChange={e=>setAddProfId(e.target.value)} style={{flex:1,minWidth:120,fontSize:12,padding:'7px 10px'}}>
              <option value="">Profissional...</option>
              {profAtivos.map(p=><option key={p.id} value={p.id}>{p.nome}</option>)}
            </select>
            <button className="btn btn-secondary btn-sm" onClick={addItem}>Adicionar</button>
          </div>
        </div>

        {/* 3. Desconto */}
        <div className="card">
          <div className="section-title">3. Desconto</div>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <select value={desconto.tipo} onChange={e=>setDesconto(d=>({...d,tipo:e.target.value,valor:''}))} style={{width:130,fontSize:12,padding:'7px 10px'}}>
              <option value="percentual">Percentual (%)</option>
              <option value="valor">Valor (R$)</option>
            </select>
            <input type="number" min="0" max={desconto.tipo==='percentual'?100:99999} value={desconto.valor}
              onChange={e=>setDesconto(d=>({...d,valor:e.target.value}))}
              placeholder={desconto.tipo==='percentual'?'0':'0,00'} style={{width:100,fontSize:13,padding:'7px 10px'}}/>
            {calc.descontoVal>0&&<span style={{fontSize:13,color:'var(--red)',fontWeight:600}}>− {fmtR$(calc.descontoVal)}</span>}
          </div>
        </div>

        {/* 4. Gorjeta */}
        <div className="card">
          <div className="section-title">4. Gorjeta <span style={{fontSize:10,color:'var(--green)',fontWeight:400,textTransform:'none',marginLeft:4}}>trânsito · fora do faturamento · divisão híbrida automática</span></div>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <select value={gorjeta.tipo} onChange={e=>setGorjeta(g=>({...g,tipo:e.target.value,valor:''}))} style={{width:130,fontSize:12,padding:'7px 10px'}}>
              <option value="valor">Valor (R$)</option>
              <option value="percentual">Percentual (%)</option>
            </select>
            <input type="number" min="0" value={gorjeta.valor}
              onChange={e=>setGorjeta(g=>({...g,valor:e.target.value}))}
              placeholder={gorjeta.tipo==='percentual'?'0':'0,00'} style={{width:100,fontSize:13,padding:'7px 10px'}}/>
            {calc.gorjetaVal>0&&<span style={{fontSize:13,color:'var(--green)',fontWeight:600}}>+ {fmtR$(calc.gorjetaVal)}</span>}
          </div>
          {calc.gorjetaVal>0&&<div style={{marginTop:12,background:'var(--greenbg)',border:'1px solid rgba(34,197,94,0.22)',borderRadius:10,padding:12}}>
            <div style={{fontSize:11,color:'var(--muted2)',marginBottom:8}}>Divisão automática: 70% valor líquido + 30% tempo executado. Sem validação manual.</div>
            {calc.gorjetaDistribuicao.map(g=><div key={g.profissionalId} className="row-item" style={{padding:'7px 0'}}>
              <span style={{fontSize:12,color:'var(--muted2)'}}>{g.profissionalNome} <span style={{fontSize:10,color:'var(--muted)'}}>· {(g.peso*100).toFixed(1)}%</span></span>
              <span style={{fontSize:12,fontWeight:800,color:'var(--green)'}}>{fmtR$(g.gorjetaLiquida)}{g.taxaGorjeta>0&&<span style={{fontSize:10,color:'var(--muted)'}}> líquido</span>}</span>
            </div>)}
          </div>}
        </div>

        {/* 5. Forma de pagamento */}
        <div className="card">
          <div className="section-title">5. Forma de pagamento</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
            {formas.map(fm=>(
              <button key={fm.id} className={'pay-btn'+(formaId===fm.id?' active':'')} onClick={()=>setFormaId(fm.id)}>
                <span style={{fontSize:18}}>{fm.icon}</span>
                <span style={{fontSize:10,fontWeight:700}}>{fm.label}</span>
                {(fm.taxaPct>0||fm.taxaFixa>0)
                  ?<span style={{fontSize:9,color:'var(--muted)'}}>{fm.taxaPct>0?fm.taxaPct+'%':''}{fm.taxaPct>0&&fm.taxaFixa>0?'+':''}{fm.taxaFixa>0?fmtR$(fm.taxaFixa):''}</span>
                  :<span style={{fontSize:9,color:'var(--green)'}}>sem taxa</span>}
              </button>
            ))}
          </div>
          {calc.taxaTotal>0&&<div style={{fontSize:12,color:'var(--muted)',marginBottom:12,padding:'8px 12px',background:'var(--surface2)',borderRadius:8}}>
            Taxa de pagamento: <b style={{color:'var(--red)'}}>− {fmtR$(calc.taxaTotal)}</b>
            {calc.taxaGorjeta>0&&<span style={{fontSize:11}}> · serviço {fmtR$(calc.taxaServico)} · gorjeta {fmtR$(calc.taxaGorjeta)}</span>}
          </div>}
          {formaId==='dinheiro'&&<div>
            <div className="field"><label>Valor recebido</label>
              <input type="text" placeholder={fmtR$(totalReceber)} value={recebido} onChange={e=>setRecebido(fmtMoney(e.target.value.replace(/\D/g,'')||'0'))} style={{fontSize:16,fontWeight:700}}/>
            </div>
            {parseMoney(recebido||'0')>0&&<div style={{display:'flex',justifyContent:'space-between',padding:'12px 14px',background:troco>0?'var(--greenbg)':'var(--surface2)',borderRadius:10,border:'1px solid '+(troco>0?'rgba(34,197,94,0.3)':'var(--border)')}}>
              <span style={{fontWeight:600,fontSize:14}}>Troco</span>
              <span style={{fontWeight:800,fontSize:16,color:troco>0?'var(--green)':'var(--red)'}}>{fmtR$(troco)}</span>
            </div>}
          </div>}
          {formaId==='misto'&&<div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:10}}>Distribua {fmtR$(totalReceber)} entre as formas{calc.gorjetaVal>0?` (serviço ${fmtR$(calc.valorComDesconto)} + gorjeta ${fmtR$(calc.gorjetaVal)})`:''}: </div>
            {formas.filter(f=>f.id!=='misto').map(fm=><div key={fm.id} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
              <span style={{width:110,fontSize:12,color:'var(--muted2)',flexShrink:0}}>{fm.icon} {fm.label}</span>
              <input type="text" placeholder="R$ 0,00" value={mistoVals[fm.id]||''}
                onChange={e=>setMistoVals(m=>({...m,[fm.id]:fmtMoney(e.target.value.replace(/\D/g,'')||'0')}))}
                style={{flex:1,fontSize:13,padding:'7px 10px'}}/>
            </div>)}
            <div style={{display:'flex',justifyContent:'space-between',padding:'10px 14px',background:Math.abs(totalMisto-totalReceber)<0.01?'var(--greenbg)':'var(--redbg)',borderRadius:8,marginTop:4}}>
              <span style={{fontSize:13,fontWeight:600}}>Distribuído</span>
              <span style={{fontSize:14,fontWeight:700,color:Math.abs(totalMisto-totalReceber)<0.01?'var(--green)':'var(--red)'}}>
                {fmtR$(totalMisto)}{Math.abs(totalMisto-totalReceber)>0.01&&(totalMisto<totalReceber?' (falta '+fmtR$(totalReceber-totalMisto)+')':' (sobra '+fmtR$(totalMisto-totalReceber)+')')}
              </span>
            </div>
            {calc.payments.length>0&&<div style={{fontSize:11,color:'var(--muted)',marginTop:8}}>Taxa real por pagamentos: {calc.payments.map(p=>`${p.formaLabel} ${fmtR$(p.valor)}${p.taxa>0?' · taxa '+fmtR$(p.taxa):''}`).join(' | ')}</div>}
          </div>}
          {!['dinheiro','misto'].includes(formaId)&&<div style={{padding:'16px',background:'var(--surface2)',borderRadius:10,textAlign:'center',border:'1px solid var(--border)'}}>
            <div style={{fontSize:28,marginBottom:6}}>{formaAtual?.icon}</div>
            <div style={{fontSize:16,fontWeight:700,color:'var(--accent2)'}}>{fmtR$(totalReceber)}</div>
            <div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>{formaAtual?.label}</div>
            {calc.gorjetaVal>0&&<div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>serviço {fmtR$(calc.valorComDesconto)} + gorjeta {fmtR$(calc.gorjetaVal)}</div>}
          </div>}
        </div>

        {/* Resumo */}
        <div className="card" style={{background:'rgba(124,106,247,0.04)',border:'1px solid rgba(124,106,247,0.2)'}}>
          <div className="section-title">Resumo financeiro</div>
          <div style={{display:'grid',gap:6}}>
            <div className="row-item"><span style={{color:'var(--muted)',fontSize:13}}>Subtotal bruto</span><span style={{fontWeight:600}}>{fmtR$(calc.subtotal)}</span></div>
            {calc.descontoVal>0&&<div className="row-item"><span style={{color:'var(--red)',fontSize:13}}>− Desconto</span><span style={{fontWeight:600,color:'var(--red)'}}>− {fmtR$(calc.descontoVal)}</span></div>}
            {calc.gorjetaVal>0&&<div className="row-item">
              <span style={{color:'var(--green)',fontSize:13}}>+ Gorjeta
                {calc.taxaGorjeta>0&&<span style={{color:'var(--muted)',fontWeight:400}}> (taxa {fmtR$(calc.taxaGorjeta)})</span>}
              </span>
              <span style={{fontWeight:600,color:'var(--green)'}}>+ {fmtR$(calc.gorjetaVal)}</span>
            </div>}
            {calc.taxaTotal>0&&<div className="row-item">
              <span style={{color:'var(--muted)',fontSize:13}}>Taxas de pagamento
                {calc.taxaGorjeta>0&&<span style={{fontSize:11}}> (serviço {fmtR$(calc.taxaServico)} + gorjeta {fmtR$(calc.taxaGorjeta)})</span>}
              </span>
              <span style={{fontWeight:600,color:'var(--muted)'}}>− {fmtR$(calc.taxaTotal)}</span>
            </div>}
            <div style={{borderTop:'2px solid var(--border)',paddingTop:10,marginTop:4,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:15,fontWeight:800}}>Total recebido</span>
              <span style={{fontSize:20,fontWeight:900,color:'var(--accent2)'}}>{fmtR$(totalReceber)}</span>
            </div>
          </div>
          <div className="divider"/>
          <div className="section-title">Distribuição</div>
          <div style={{display:'grid',gap:6}}>
            <div className="row-item"><span style={{color:'var(--muted)',fontSize:13}}>Comissão profissionais</span><span style={{fontWeight:700,color:'var(--yellow)'}}>{fmtR$(calc.totalComissao)}</span></div>
            {calc.gorjetaStaff>0&&<div className="row-item">
              <span style={{color:'var(--muted)',fontSize:13}}>Gorjeta líquida a repassar <span style={{fontSize:11,color:'var(--muted)'}}>(híbrido automático)</span></span>
              <span style={{fontWeight:700,color:'var(--green)'}}>{fmtR$(calc.gorjetaStaff)}</span>
            </div>}
            {calc.taxaGorjeta>0&&<div className="row-item"><span style={{color:'var(--muted)',fontSize:13}}>Taxa da gorjeta <span style={{fontSize:11,color:'var(--muted)'}}>(absorvida no repasse)</span></span><span style={{fontWeight:600,color:'var(--red)'}}>− {fmtR$(calc.taxaGorjeta)}</span></div>}
            {calc.gorjetaDistribuicao.length>0&&<div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:10,padding:10,margin:'4px 0 8px'}}>
              {calc.gorjetaDistribuicao.map(g=><div key={g.profissionalId} style={{display:'flex',justifyContent:'space-between',fontSize:11,padding:'4px 0'}}>
                <span style={{color:'var(--muted2)'}}>{g.profissionalNome} · {g.criterio}</span>
                <span style={{fontWeight:800,color:'var(--green)'}}>{fmtR$(g.gorjetaLiquida)}</span>
              </div>)}
            </div>}
            <div className="row-item" style={{borderBottom:'none'}}><span style={{color:'var(--muted)',fontSize:13}}>Líquido real salão</span><span style={{fontWeight:700,color:'var(--green)'}}>{fmtR$(calc.receitaEmpresa)}</span></div>
          </div>
        </div>

        {/* Obs */}
        <div className="card">
          <div className="section-title">6. Observações</div>
          <textarea rows={2} value={obs} onChange={e=>setObs(e.target.value)} placeholder="Notas..." style={{resize:'none'}}/>
        </div>

        {calc.temNegativo&&<div className="alerta-neg" style={{padding:'14px 16px',borderRadius:10}}>
          ⚠ Checkout bloqueado — comissão negativa detectada. A taxa da forma de pagamento selecionada supera a comissão do profissional em pelo menos um item. Ajuste o valor do serviço, a % de comissão nos overrides, ou selecione uma forma de pagamento com menor taxa.
        </div>}
        {calc.temGorjetaSemDono&&<div className="alerta-neg" style={{padding:'14px 16px',borderRadius:10}}>
          ⚠ Checkout bloqueado — gorjeta sem profissional calculado. Verifique os itens da comanda.
        </div>}

        <button className="btn btn-primary" style={{width:'100%',padding:'16px',fontSize:15,fontWeight:800,opacity:(calc.temNegativo||calc.temGorjetaSemDono)?0.4:1,pointerEvents:(calc.temNegativo||calc.temGorjetaSemDono)?'none':'auto'}} onClick={finalizar}>
          ✓ Finalizar e registrar pagamento
        </button>
      </div>
    </div>
  </div>;
}

/* ── FINANCEIRO ── */
function Financeiro({profissionais}){
  const[tab,setTab]=useState('resumo');
  const[cmds]=useState(()=>load(KEYS.comandos)||[]);
  const[caixaMov,setCaixaMov]=useState(()=>load(KEYS.caixa)||[]);
  const[clientes]=useState(()=>load(KEYS.clientes)||[]);
  const[repasses,setRepasses]=useState(()=>load(KEYS.repasses)||[]);
  const[repasseModal,setRepasseModal]=useState(null);
  const[repasseForm,setRepasseForm]=useState({status:'pendente',responsavel:'',observacao:''});
  const[filtro,setFiltro]=useState({inicio:todayStr(),fim:todayStr(),prof:'',forma:'',modelo:''});
  const[caixaAberto,setCaixaAberto]=useState(()=>{const m=load(KEYS.caixa)||[];return m.find(x=>x.tipo==='abertura'&&!m.find(y=>y.tipo==='fechamento'&&y.sessaoId===x.id))||null;});
  const[valorAbertura,setValorAbertura]=useState('');
  const[addMov,setAddMov]=useState(null);
  const[movForm,setMovForm]=useState({tipo:'sangria',valor:'',descricao:'',autorizado_por:''});
  const[fechamento,setFechamento]=useState(null);
  const[fechForm,setFechForm]=useState({valorFisico:'',responsavel:'',observacao:''});
  useEffect(()=>save(KEYS.repasses,repasses),[repasses]);

  const REPASSE_LABEL={pendente:'Pendente',marcado_para_pagamento:'Marcado',pago_manual:'Pago manual',cancelado:'Cancelado'};
  const REPASSE_CLS={pendente:'badge-yellow',marcado_para_pagamento:'badge-blue',pago_manual:'badge-green',cancelado:'badge-red'};

  const financeRM=useMemo(()=>buildFinanceReadModel({cmds,profissionais,clientes,filters:filtro}),[cmds,profissionais,clientes,filtro]);
  const cmdsFilt=financeRM.commands;
  const tot=financeRM.totals;
  const recon=calcFinanceReconciliation(financeRM);

  const caixaDia=caixaMov.filter(m=>m.data===todayStr());
  const saldoCaixa=caixaDia.reduce((s,m)=>['abertura','entrada','suprimento','gorjeta'].includes(m.tipo)?s+(m.valor||0):s-(m.valor||0),0);
  const itemKey=(cmd,it,idx)=>it.id||`${cmd.id}_${idx}`;
  const getRepasse=(cmd,it,idx)=>repasses.find(r=>r.comandoId===cmd.id&&r.itemId===itemKey(cmd,it,idx))||{status:'pendente'};

  function abrirCaixa(){
    if(!valorAbertura){toast('Informe o valor de abertura','error');return;}
    const mov={id:uid(),tipo:'abertura',valor:parseMoney(valorAbertura),descricao:'Abertura de caixa',data:todayStr(),hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})};
    const novas=[...caixaMov,mov];setCaixaMov(novas);save(KEYS.caixa,novas);setCaixaAberto(mov);setValorAbertura('');toast('Caixa aberto');
  }
  function abrirModalFechamento(){setFechamento({saldo:saldoCaixa});setFechForm({valorFisico:fmtMoney(String(Math.round(saldoCaixa*100))),responsavel:'',observacao:''});}
  function confirmarFechamento(){
    if(!fechamento)return;
    const valorFisico=parseMoney(fechForm.valorFisico||'0');
    const diferenca=Math.round((valorFisico-fechamento.saldo)*100)/100;
    const mov={id:uid(),tipo:'fechamento',valor:fechamento.saldo,valorFisico,diferenca,responsavel:fechForm.responsavel,observacao:fechForm.observacao,sessaoId:caixaAberto?.id,descricao:'Fechamento de caixa',data:todayStr(),hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})};
    const novas=[...caixaMov,mov];setCaixaMov(novas);save(KEYS.caixa,novas);setCaixaAberto(null);setFechamento(null);toast('Caixa fechado');
  }
  function registrarMov(){
    if(!movForm.valor){toast('Informe o valor','error');return;}
    const mov={id:uid(),...movForm,valor:parseMoney(movForm.valor),data:todayStr(),hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})};
    const novas=[...caixaMov,mov];setCaixaMov(novas);save(KEYS.caixa,novas);setAddMov(null);setMovForm({tipo:'sangria',valor:'',descricao:'',autorizado_por:''});toast('Registrado');
  }
  function abrirRepasse(cmd,it,idx){
    const atual=getRepasse(cmd,it,idx);
    setRepasseModal({cmd,it,idx,repasse:atual});
    setRepasseForm({status:atual.status||'pendente',responsavel:atual.responsavel||'',observacao:atual.observacao||''});
  }
  function salvarRepasse(){
    const {cmd,it,idx,repasse}=repasseModal;
    const base=repasse.id?repasse:{id:uid(),comandoId:cmd.id,itemId:itemKey(cmd,it,idx),profissionalId:it.profissionalId,valor:it.comissaoVal||0,criadoEm:new Date().toISOString()};
    const agora=new Date();
    const novo={...base,status:repasseForm.status,dataStatus:todayStr(),horaStatus:agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),responsavel:repasseForm.responsavel,observacao:repasseForm.observacao,atualizadoEm:agora.toISOString()};
    setRepasses(prev=>prev.some(r=>r.id===novo.id)?prev.map(r=>r.id===novo.id?novo:r):[...prev,novo]);
    setRepasseModal(null);toast('Status de repasse atualizado');
  }

  return <div style={{padding:24,maxWidth:900,margin:'0 auto'}}>
    <div style={{marginBottom:20}}><h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.02em'}}>Financeiro</h1><div style={{fontSize:13,color:'var(--muted)',marginTop:2}}>Comissões · Caixa · Relatórios</div></div>
    <div style={{display:'flex',borderBottom:'1px solid var(--border)',marginBottom:24}}>
      {[['resumo','📊 Resumo'],['comissoes','💰 Comissões'],['caixa','🏧 Caixa'],['historico','📋 Histórico']].map(([k,l])=><button key={k} className={'tab-btn'+(tab===k?' active':'')} onClick={()=>setTab(k)}>{l}</button>)}
    </div>

    {tab!=='caixa'&&<div className="card" style={{marginBottom:16,padding:'14px 16px'}}><div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-end'}}>
      <div className="field" style={{marginBottom:0,minWidth:110}}><label>De</label><input type="date" value={filtro.inicio} onChange={e=>setFiltro(f=>({...f,inicio:e.target.value}))}/></div>
      <div className="field" style={{marginBottom:0,minWidth:110}}><label>Até</label><input type="date" value={filtro.fim} onChange={e=>setFiltro(f=>({...f,fim:e.target.value}))}/></div>
      <div className="field" style={{marginBottom:0,minWidth:130}}><label>Profissional</label><select value={filtro.prof} onChange={e=>setFiltro(f=>({...f,prof:e.target.value}))}><option value="">Todos</option>{profissionais.map(p=><option key={p.id} value={p.id}>{p.nome}</option>)}</select></div>
      <div className="field" style={{marginBottom:0,minWidth:120}}><label>Forma pgto</label><select value={filtro.forma} onChange={e=>setFiltro(f=>({...f,forma:e.target.value}))}><option value="">Todas</option>{loadFormas().map(f=><option key={f.id} value={f.id}>{f.label}</option>)}</select></div>
      <div className="field" style={{marginBottom:0,minWidth:130}}><label>Modelo</label><select value={filtro.modelo} onChange={e=>setFiltro(f=>({...f,modelo:e.target.value}))}><option value="">Todos</option>{MODELOS_COM.map(m=><option key={m.id} value={m.id}>{m.label}</option>)}</select></div>
      <button className="btn btn-secondary btn-sm" onClick={()=>setFiltro({inicio:todayStr(),fim:todayStr(),prof:'',forma:'',modelo:''})}>Limpar</button>
    </div></div>}

    {tab==='resumo'&&<div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:12,marginBottom:20}}>{[
        {l:'Serviços líquidos',v:fmtR$(tot.total),c:'var(--accent2)',icon:'💰'},{l:'Total recebido',v:fmtR$(tot.entrada),c:'var(--blue)',icon:'🧾'},{l:'Líquido salão',v:fmtR$(tot.empresa),c:'var(--green)',icon:'🏦'},{l:'Comissões',v:fmtR$(tot.comissao),c:'var(--yellow)',icon:'👤'},{l:'Taxas pgto',v:fmtR$(tot.taxa),c:'var(--red)',icon:'💸'},{l:'Gorjetas líquidas',v:fmtR$(tot.gorjeta),c:'var(--teal)',icon:'🎁'},{l:'Atendimentos',v:tot.qtd,c:'var(--blue)',icon:'📋'},
      ].map(({l,v,c,icon})=><div key={l} className="card" style={{textAlign:'center',padding:'18px 12px'}}><div style={{fontSize:22,marginBottom:6}}>{icon}</div><div style={{fontSize:10,color:'var(--muted)',marginBottom:4,textTransform:'uppercase',letterSpacing:'0.06em'}}>{l}</div><div style={{fontSize:18,fontWeight:800,color:c}}>{v}</div></div>)}</div>
      {Object.keys(tot.porForma).length>0&&<div className="card" style={{marginBottom:12}}><div className="section-title">Por forma de pagamento real {filtro.forma&&<span className="badge badge-accent" style={{marginLeft:6}}>filtro rateado</span>}</div>{Object.values(tot.porForma).map(f=><div key={f.label} className="row-item"><span>{f.label}<span style={{fontSize:11,color:'var(--muted)',marginLeft:6}}>{f.qtd} pgto(s){f.taxa>0?' · taxa '+fmtR$(f.taxa):''}</span></span><b style={{color:'var(--accent2)'}}>{fmtR$(f.valor)}</b></div>)}</div>}
      {Object.keys(tot.porModelo).length>0&&<div className="card" style={{marginBottom:12}}><div className="section-title">Comissão por modelo</div>{Object.entries(tot.porModelo).map(([k,v])=>{const m=MODELOS_COM.find(x=>x.id===k);return <div key={k} className="row-item"><span style={{color:m?.cor||'var(--text)'}}>{m?.icon} {m?.label||k}</span><b style={{color:'var(--yellow)'}}>{fmtR$(v)}</b></div>;})}</div>}
      {Object.keys(tot.porProf).length>0&&<div className="card"><div className="section-title">Por profissional</div>{Object.values(tot.porProf).map(p=>{const mb=MODELOS_COM.find(m=>m.id===p.modelo);return <div key={p.nome} className="row-item"><div><div style={{fontWeight:600,fontSize:13}}>{p.nome}</div><div style={{fontSize:11,color:mb?.cor||'var(--muted)'}}>{mb?.icon} {mb?.label||'—'} · {p.qtd} item(ns)</div></div><div style={{textAlign:'right'}}><div style={{fontWeight:700,color:'var(--yellow)'}}>Com. {fmtR$(p.comissao)}</div>{p.gorjeta>0&&<div style={{fontSize:11,color:'var(--green)'}}>Gorj. {fmtR$(p.gorjeta)}</div>}<div style={{fontSize:11,color:'var(--muted)'}}>base {fmtR$(p.total)}</div></div></div>;})}</div>}
      {!recon.ok&&<div className="alerta-neg" style={{marginBottom:12}}>⚠ Divergência de leitura: pagamentos {fmtR$(recon.entradaPayments)} vs comandas {fmtR$(recon.entradaCmds)}. Revisar registros legados.</div>}
      {cmdsFilt.length===0&&<div className="card" style={{textAlign:'center',padding:48,color:'var(--muted)'}}><div style={{fontSize:32,marginBottom:12}}>📊</div><div style={{fontWeight:600}}>Sem dados no período</div></div>}
    </div>}

    </div>}

    {tab==='historico'&&<div>{cmdsFilt.length===0?<div className="card" style={{textAlign:'center',padding:48,color:'var(--muted)'}}><div style={{fontSize:32,marginBottom:12}}>📋</div><div style={{fontWeight:600}}>Sem registros</div></div>:<div style={{display:'grid',gap:10}}>{[...cmdsFilt].reverse().map(c=>{const cli=clientes.find(x=>x.id===c.clienteId);return <div key={c.id} className="card" style={{padding:'14px 16px'}}><div style={{display:'flex',alignItems:'flex-start',gap:12,flexWrap:'wrap'}}><div style={{flex:1,minWidth:200}}><div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}><span style={{fontWeight:700,fontSize:14}}>{cli?.nome||'Avulso / sem cliente'}</span><span className="badge badge-muted">{(c.payments&&c.payments.length)?c.payments.map(p=>p.formaLabel||p.formaId).join(' + '):(c.forma||c.formaId)}</span>{c.descontoVal>0&&<span className="badge badge-red">desc {fmtR$(c.descontoVal)}</span>}{c.gorjetaVal>0&&<span className="badge badge-green">gorjeta {fmtR$(c.gorjetaVal)}</span>}{c.taxaPgto>0&&<span className="badge badge-muted">taxa {fmtR$(c.taxaPgto)}</span>}</div><div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>{c.data} às {c.hora}</div><div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>{(c.itens||[]).map(it=>it.descricao).join(' · ')}</div>{(c.payments&&c.payments.length>1)&&<div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>Pagamentos: {c.payments.map(p=>`${p.formaLabel} ${fmtR$(p.valor)}`).join(' | ')}</div>}{(c.gorjetaDistribuicao&&c.gorjetaDistribuicao.length>0)&&<div style={{fontSize:11,color:'var(--green)',marginTop:4}}>Gorjeta: {c.gorjetaDistribuicao.map(g=>`${g.profissionalNome} ${fmtR$(g.gorjetaLiquida)}`).join(' | ')}</div>}</div><div style={{textAlign:'right',flexShrink:0}}><div style={{fontSize:18,fontWeight:800,color:'var(--accent2)'}}>{fmtR$(c.totalReceber!==undefined?c.totalReceber:(c.total||0))}</div><div style={{fontSize:11,color:'var(--muted)'}}>Serviços: {fmtR$(c.total||0)}</div><div style={{fontSize:11,color:'var(--yellow)'}}>Comissão: {fmtR$(c.totalComissao||0)}</div><div style={{fontSize:11,color:'var(--green)'}}>Salão: {fmtR$(c.receitaEmpresa||0)}</div></div></div></div>;})}</div>}</div>}
